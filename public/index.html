    var og=el('optgroup','');og.label=c.label;
    byC[c.key].forEach(function(k){
      var opt=el('option','',getVarLabel(k));opt.value=k;og.appendChild(opt);
    });
    vsel.appendChild(og);
  });

  vsel.addEventListener('change',function(){st.selected=vsel.value;renderSBS(mainPanel,st);});
  gbar.appendChild(vsel);

  gbar.appendChild(el('label','','Group by:'));
  var gsel=el('select','');
  [{v:'none',l:'None'},{v:'transition',l:'Transition Group'}].forEach(function(o){
    var opt=el('option','',o.l);opt.value=o.v;gsel.appendChild(opt);
  });
  gsel.addEventListener('change',function(){st.groupBy=gsel.value;renderSBS(mainPanel,st);});
  gbar.appendChild(gsel);

  pane.style.flexDirection='column';
  pane.appendChild(gbar);

  var mainPanel=el('div','main-panel');
  mainPanel.style.overflowY='auto';
  pane.appendChild(mainPanel);

  renderSBS(mainPanel,st);
}

function renderSBS(panel,st){
  clearEl(panel);
  if(!st.selected){
    renderChangesAtGlance(panel,st);
    return;
  }

  // Back to overview button
  var backBtn=el('button','preset-btn','\u2190 Back to Changes Overview');
  backBtn.style.cssText='margin-bottom:10px;';
  backBtn.addEventListener('click',function(){st.selected=null;renderSBS(panel,st);});
  panel.appendChild(backBtn);

  var key=st.selected;
  var meta=getVarMeta(key);

  if(st.groupBy==='none'){
    renderSBSSingle(panel,key);
  } else {
    renderSBSGrouped(panel,key);
  }
}

function renderChangesAtGlance(panel,st){
  var matchedN=DATA.matched.link?DATA.matched.link.length:0;
  var card=el('div','card');
  var tit=el('div','card-title','Changes at a Glance');
  tit.appendChild(el('span','badge badge-accent','Matched N = '+matchedN));
  card.appendChild(tit);

  var changeVars=['DASS_Total','DASS_Depression','DASS_Anxiety','DASS_Stress','ECR_AI_Avoidance','ECR_AI_Anxiety','ANTRO_Mean'];
  var changeData=[];
  var maxAbs=0;

  changeVars.forEach(function(k){
    if(!DATA.w1[k]||!DATA.w2[k])return;
    var paired=getPairedVecs(k,null);
    if(!paired||paired.w1.length<2)return;
    var diffs=[];
    for(var i=0;i<paired.w1.length;i++)diffs.push(paired.w2[i]-paired.w1[i]);
    var pt=pairedT(diffs);
    changeData.push({key:k,label:getVarLabel(k),mean:pt.mean,sd:pt.sd,p:pt.p,t:pt.t,df:pt.df,n:paired.w1.length});
    if(Math.abs(pt.mean)>maxAbs)maxAbs=Math.abs(pt.mean);
  });

  if(maxAbs===0)maxAbs=1;

  var hint=el('div','');hint.style.fontSize='11px';hint.style.color='var(--text-muted)';hint.style.marginBottom='10px';
  hint.textContent='Click any row to explore that variable in detail.';
  card.appendChild(hint);

  changeData.forEach(function(cd){
    var row=el('div','glance-row');
    row.addEventListener('click',function(){
      st.selected=cd.key;
      // find the select element in the parent pane and update it
      var pane=panel.parentElement;
      var sel=pane?pane.querySelector('select'):null;
      if(sel){sel.value=cd.key;}
      renderSBS(panel,st);
    });

    row.appendChild(el('div','glance-label',cd.label));

    var barArea=el('div','glance-bar-area');
    var neg=el('div','glance-neg');
    var pos=el('div','glance-pos');
    var center=el('div','glance-center');

    if(cd.mean<0){
      var seg=el('div','glance-seg');
      seg.style.background='linear-gradient(270deg,#a04848,#e09090)';
      seg.style.width=(Math.abs(cd.mean)/maxAbs*100)+'%';
      neg.appendChild(seg);
    } else if(cd.mean>0){
      var seg2=el('div','glance-seg');
      seg2.style.background='linear-gradient(90deg,#408868,#6dd8a0)';
      seg2.style.width=(Math.abs(cd.mean)/maxAbs*100)+'%';
      pos.appendChild(seg2);
    }

    barArea.appendChild(neg);barArea.appendChild(center);barArea.appendChild(pos);
    row.appendChild(barArea);

    var star=el('div','glance-star',cd.p<.05?'*':'');
    row.appendChild(star);

    var valText=(cd.mean>=0?'+':'')+fmt(cd.mean,2)+' (t='+fmt(cd.t,2)+', p='+fmtP(cd.p)+')';
    row.appendChild(el('div','glance-val',valText));

    card.appendChild(row);
  });

  // Legend
  var legend=el('div','');legend.style.fontSize='10px';legend.style.color='var(--text-muted)';legend.style.marginTop='10px';legend.style.borderTop='1px solid var(--border)';legend.style.paddingTop='8px';
  legend.textContent='Red = increase (worse for distress), Green = decrease (improvement). * = p < .05 (paired t-test).';
  card.appendChild(legend);

  panel.appendChild(card);
}

function renderSBSSingle(panel,key){
  var paired=getPairedVecs(key,null);
  if(!paired||paired.w1.length===0){
    panel.appendChild(el('div','card','No matched data available for this variable.'));
    return;
  }

  var meta=getVarMeta(key);

  if(isContinuous(key)){
    // Side by side stats
    var s1=descStats(paired.w1),s2=descStats(paired.w2);
    var card=el('div','card');
    var tit=el('div','card-title',meta.label||key);
    tit.appendChild(el('span','badge badge-accent','Matched N = '+paired.w1.length));
    card.appendChild(tit);

    // Two bars: W1 mean, W2 mean
    var maxM=Math.max(s1.mean+s1.sd,s2.mean+s2.sd);if(maxM===0)maxM=1;
    var area=el('div','chart-area');

    var row1=el('div','bar-row');
    row1.appendChild(el('div','bar-label','Wave 1'));
    var t1=el('div','bar-track');var f1=el('div','bar-fill bar-fill-blue');
    f1.style.width=(s1.mean/maxM*100)+'%';t1.appendChild(f1);row1.appendChild(t1);
    row1.appendChild(el('div','bar-val','M = '+fmt(s1.mean)+' (SD = '+fmt(s1.sd)+')'));
    area.appendChild(row1);

    var row2=el('div','bar-row');
    row2.appendChild(el('div','bar-label','Wave 2'));
    var t2=el('div','bar-track');var f2=el('div','bar-fill bar-fill-orange');
    f2.style.width=(s2.mean/maxM*100)+'%';t2.appendChild(f2);row2.appendChild(t2);
    row2.appendChild(el('div','bar-val','M = '+fmt(s2.mean)+' (SD = '+fmt(s2.sd)+')'));
    area.appendChild(row2);

    card.appendChild(area);

    // Paired t-test
    var diffs=[];
    for(var i=0;i<paired.w1.length;i++)diffs.push(paired.w2[i]-paired.w1[i]);
    var pt=pairedT(diffs);
    var testEl=el('div','','');
    testEl.style.marginTop='8px';testEl.style.fontSize='12px';testEl.style.color='var(--text-secondary)';
    var dCohen=pt.sd>0?pt.mean/pt.sd:0;
    testEl.textContent='Paired t('+pt.df+') = '+fmt(pt.t)+', p = '+fmtP(pt.p)+' '+sigStars(pt.p)+', d = '+fmt(dCohen);
    if(pt.p<.05)testEl.style.color='var(--caution)';
    card.appendChild(testEl);
    panel.appendChild(card);

    // Change score distribution
    var csCard=el('div','card');
    csCard.appendChild(el('div','card-title','Change Scores (W2 - W1)'));
    var cStats=descStats(diffs);
    var maxAbs=Math.max(Math.abs(cStats.min),Math.abs(cStats.max));if(maxAbs===0)maxAbs=1;
    var nbins=12;
    var binW2=maxAbs*2/nbins;
    var bins2=new Array(nbins).fill(0);
    for(var i=0;i<diffs.length;i++){
      var b=Math.floor((diffs[i]+maxAbs)/binW2);
      if(b>=nbins)b=nbins-1;if(b<0)b=0;bins2[b]++;
    }
    var maxBin2=Math.max.apply(null,bins2)||1;
    var cArea=el('div','chart-area');
    for(var i=0;i<nbins;i++){
      var lo=-maxAbs+i*binW2,hi=-maxAbs+(i+1)*binW2;
      var row=el('div','bar-row');
      var lbl=el('div','bar-label',fmt(lo,1)+' to '+fmt(hi,1));
      lbl.style.width='100px';lbl.style.minWidth='100px';lbl.style.fontSize='10px';
      row.appendChild(lbl);
      var track=el('div','bar-track');
      var fill=el('div','bar-fill');
      var midPt=(lo+hi)/2;
      fill.style.background=midPt<0?'linear-gradient(90deg,#a04848,#e09090)':'linear-gradient(90deg,#408868,#6dd8a0)';
      fill.style.width=(bins2[i]/maxBin2*100)+'%';
      track.appendChild(fill);row.appendChild(track);
      row.appendChild(el('div','bar-val',String(bins2[i])));
      cArea.appendChild(row);
    }
    csCard.appendChild(cArea);

    var csStats=el('div','','');
    csStats.style.fontSize='12px';csStats.style.color='var(--text-secondary)';csStats.style.marginTop='8px';
    csStats.textContent='Mean change = '+fmt(cStats.mean)+' (SD = '+fmt(cStats.sd)+')';
    csCard.appendChild(csStats);
    panel.appendChild(csCard);

  } else if(isBinary(key)){
    var card=el('div','card');
    var tit=el('div','card-title',meta.label||key);
    tit.appendChild(el('span','badge badge-accent','Matched N = '+paired.w1.length));
    card.appendChild(tit);

    var n1w1=0,n1w2=0;
    for(var i=0;i<paired.w1.length;i++){if(paired.w1[i]===1)n1w1++;if(paired.w2[i]===1)n1w2++;}
    var pct1=(n1w1/paired.w1.length*100),pct2=(n1w2/paired.w2.length*100);

    var area=el('div','chart-area');
    var maxP=Math.max(pct1,pct2);if(maxP===0)maxP=1;

    var row1=el('div','bar-row');
    row1.appendChild(el('div','bar-label','W1 (Yes)'));
    var t1=el('div','bar-track');var f1=el('div','bar-fill bar-fill-blue');
    f1.style.width=(pct1/maxP*100)+'%';t1.appendChild(f1);row1.appendChild(t1);
    row1.appendChild(el('div','bar-val',n1w1+' ('+fmt(pct1,1)+'%)'));
    area.appendChild(row1);

    var row2=el('div','bar-row');
    row2.appendChild(el('div','bar-label','W2 (Yes)'));
    var t2=el('div','bar-track');var f2=el('div','bar-fill bar-fill-orange');
    f2.style.width=(pct2/maxP*100)+'%';t2.appendChild(f2);row2.appendChild(t2);
    row2.appendChild(el('div','bar-val',n1w2+' ('+fmt(pct2,1)+'%)'));
    area.appendChild(row2);

    card.appendChild(area);

    var diff=pct2-pct1;
    var chg=el('div','','');
    chg.style.fontSize='12px';chg.style.marginTop='8px';
    chg.style.color=diff>0?'var(--success)':diff<0?'var(--error)':'var(--text-secondary)';
    chg.textContent='Change: '+(diff>0?'+':'')+fmt(diff,1)+' percentage points';
    card.appendChild(chg);
    panel.appendChild(card);
  }
}

function renderSBSGrouped(panel,key){
  var tGroups=[
    {value:0,label:'Never',color:'#8b98a5'},
    {value:1,label:'Adopter',color:'#6dd8a0'},
    {value:2,label:'Continuer',color:'#5ba8e0'},
    {value:3,label:'Discontinuer',color:'#e09090'}
  ];

  tGroups.forEach(function(tg){
    var mask=new Uint8Array(DATA.meta.w2_n);
    for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;
    var paired=getPairedVecs(key,mask);
    if(!paired||paired.w1.length<2)return;

    var card=el('div','card');
    card.style.borderLeftColor=tg.color;card.style.borderLeftWidth='3px';

    if(isContinuous(key)){
      var s1=descStats(paired.w1),s2=descStats(paired.w2);
      var tit=el('div','card-title',tg.label);
      tit.appendChild(el('span','badge badge-muted','N = '+paired.w1.length));
      card.appendChild(tit);

      var maxM=Math.max(s1.mean+s1.sd,s2.mean+s2.sd);if(maxM===0)maxM=1;
      var area=el('div','chart-area');
      [{l:'W1',s:s1,cls:'bar-fill-blue'},{l:'W2',s:s2,cls:'bar-fill-orange'}].forEach(function(w){
        var row=el('div','bar-row');
        row.appendChild(el('div','bar-label',w.l));
        var track=el('div','bar-track');var fill=el('div','bar-fill '+w.cls);
        fill.style.width=(w.s.mean/maxM*100)+'%';track.appendChild(fill);row.appendChild(track);
        row.appendChild(el('div','bar-val','M='+fmt(w.s.mean)));
        area.appendChild(row);
      });
      card.appendChild(area);

      var diffs=[];for(var i=0;i<paired.w1.length;i++)diffs.push(paired.w2[i]-paired.w1[i]);
      var pt=pairedT(diffs);
      var te=el('div','','');te.style.fontSize='11px';te.style.color='var(--text-secondary)';te.style.marginTop='6px';
      te.textContent='t('+pt.df+')='+fmt(pt.t)+', p='+fmtP(pt.p)+' '+sigStars(pt.p);
      if(pt.p<.05)te.style.color='var(--caution)';
      card.appendChild(te);
    }
    panel.appendChild(card);
  });
}

function updateAdvStepBar(st){
  var bar=document.getElementById('adv-step-bar');
  if(!bar)return;
  var items=bar.querySelectorAll('.step-item');
  // Determine current step
  var hasMode=!!st.mode;
  var hasVars=false;
  if(st.mode==='correlation')hasVars=st.selVars.length>=2;
  else if(st.mode==='regression')hasVars=!!st.dv&&st.ivs.length>0;
  else if(st.mode==='mediation')hasVars=!!st.medX&&!!st.medM&&!!st.medY;
  else if(st.mode==='moderation')hasVars=!!st.modDV&&!!st.modIV&&!!st.modMod;
  var curStep=hasVars?2:(hasMode?1:0);
  items.forEach(function(si){
    var s=parseInt(si.dataset.step);
    si.classList.remove('active','done');
    if(s<curStep)si.classList.add('done');
    else if(s===curStep)si.classList.add('active');
  });
}

function getAdvFilter(st){
  var f={};
  if(st.filterPreset==='aimh')f.aimh=1;

  return f;
}

function getAdvWave(st){return st.waveMode==='w2'||st.waveMode==='cross'?2:1;}
function getContinuousVars(wave){
  return getVarsForWave(wave).filter(function(k){return isContinuous(k);});

function getAllAnalysisVars(wave){
  return getVarsForWave(wave).filter(function(k){return isContinuous(k)||isBinary(k);});
}

function renderCorrelation(panel,st){
  if(st.selVars.length<2){
    panel.appendChild(el('div','placeholder','Select at least 2 variables'));
    return;
  }
  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);

  // Get aligned data
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;
  var src=wave===1?DATA.w1:DATA.w2;
  var vars=st.selVars;
  var arrs=vars.map(function(v){return src[v];});

  // Compute pairwise correlations
  var nv=vars.length;
  var rMat=[],pMat=[];
  for(var i=0;i<nv;i++){rMat[i]=[];pMat[i]=[];
    for(var j=0;j<nv;j++){
      if(i===j){rMat[i][j]=1;pMat[i][j]=0;continue;}
      var x=[],y=[];
      for(var k=0;k<n;k++){
        if(!mask[k])continue;
        var a=arrs[i]?arrs[i][k]:null,b=arrs[j]?arrs[j][k]:null;
        if(a!==null&&a!==undefined&&!isNaN(a)&&b!==null&&b!==undefined&&!isNaN(b)){x.push(a);y.push(b);}
      }
      var pr=pearsonR(x,y);
      rMat[i][j]=pr.r;pMat[i][j]=pr.p;
    }
  }

  // Heatmap
  var card=el('div','card');
  card.appendChild(el('div','card-title','Correlation Matrix'));

  var tbl=el('table','heatmap');
  var thead=el('thead','');
  var thr=el('tr','');
  thr.appendChild(el('th','',''));
  for(var j=0;j<nv;j++){
    var th=el('th','',getVarLabel(vars[j]).substring(0,12));
    th.title=getVarLabel(vars[j]);
    thr.appendChild(th);
  }
  thead.appendChild(thr);tbl.appendChild(thead);

  var tbody=el('tbody','');
  for(var i=0;i<nv;i++){
    var tr=el('tr','');
    var rlabel=el('th','',getVarLabel(vars[i]).substring(0,12));
    rlabel.title=getVarLabel(vars[i]);rlabel.style.textAlign='right';
    tr.appendChild(rlabel);
    for(var j=0;j<nv;j++){
      var td=el('td','',fmt(rMat[i][j])+sigStars(pMat[i][j]));
      // Color by value
      var absR=Math.abs(rMat[i][j]);
      var alpha=Math.min(0.7,absR);
      if(i===j)td.style.background='rgba(91,168,224,0.1)';
      else if(rMat[i][j]>0)td.style.background='rgba(109,216,160,'+alpha+')';
      else td.style.background='rgba(224,144,144,'+alpha+')';
      td.style.color=absR>0.3?'#fff':'var(--text-primary)';
      td.style.fontSize='11px';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  card.appendChild(tbl);
  panel.appendChild(card);

  // Detail table
  var dCard=el('div','card');
  dCard.appendChild(el('div','card-title','Pairwise Correlations'));
  var dtbl=el('table','stats-table');
  var dth=el('thead','');
  var dthr=el('tr','');
  ['Pair','r','p','N','Sig'].forEach(function(h){dthr.appendChild(el('th','',h));});
  dth.appendChild(dthr);dtbl.appendChild(dth);
  var dtb=el('tbody','');
  for(var i=0;i<nv;i++){
    for(var j=i+1;j<nv;j++){
      var tr=el('tr','');
      tr.appendChild(el('td','',getVarLabel(vars[i]).substring(0,15)+' x '+getVarLabel(vars[j]).substring(0,15)));
      tr.appendChild(el('td','',fmt(rMat[i][j],3)));
      var ptd=el('td','',fmtP(pMat[i][j]));if(pMat[i][j]<.05)ptd.className='sig';
      tr.appendChild(ptd);
      // Count N
      var x2=[],y2=[];
      for(var k=0;k<n;k++){
        if(!mask[k])continue;
        var a=arrs[i]?arrs[i][k]:null,b=arrs[j]?arrs[j][k]:null;
        if(a!==null&&!isNaN(a)&&b!==null&&!isNaN(b)){x2.push(1);}
      }
      tr.appendChild(el('td','',String(x2.length)));
      var stEl=el('td','',sigStars(pMat[i][j]));if(pMat[i][j]<.05)stEl.className='sig';
      tr.appendChild(stEl);
      dtb.appendChild(tr);
    }
  }
  dtbl.appendChild(dtb);dCard.appendChild(dtbl);
  panel.appendChild(dCard);

  // Narrative interpretation for correlation
  // Build pairs array for the narrative generator
  var corPairs = [];
  var corN = 0;
  for (var ci = 0; ci < nv; ci++) {
    for (var cj = ci + 1; cj < nv; cj++) {
      // Count pairwise N
      var cx = [], cy = [];
      for (var ck = 0; ck < n; ck++) {
        if (!mask[ck]) continue;
        var ca = arrs[ci] ? arrs[ci][ck] : null, cb = arrs[cj] ? arrs[cj][ck] : null;
        if (ca !== null && !isNaN(ca) && cb !== null && !isNaN(cb)) { cx.push(1); }
      }
      corPairs.push({ label1: getVarLabel(vars[ci]), label2: getVarLabel(vars[cj]), r: rMat[ci][cj], p: pMat[ci][cj] });
      if (cx.length > corN) corN = cx.length;
    }
  }
  var narrativeCard = generateNarrative('correlation', { pairs: corPairs, n: corN }, { vars: vars.map(function(v) { return getVarLabel(v); }) });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'correlation');
  }
}

function renderRegression(panel,st){
  if(!st.dv||st.ivs.length===0){
    panel.appendChild(el('div','placeholder','Select a DV and at least one IV'));
    return;
  }

  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);
  var isCross=st.waveMode==='cross';
  var dvIsBinary=isBinary(st.dv);

  // Build aligned data
  var allVars=st.ivs.slice();
  var y=[],X=[];
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;

  if(isCross){
    // IVs from W1 (via matched.link), DV from W2
    var dvArr=DATA.w2[st.dv];
    var ivArrs=allVars.map(function(v){return DATA.w1[v];});
    for(var i=0;i<DATA.meta.w2_n;i++){
      if(!mask[i])continue;
      var w1i=DATA.matched.link[i];
      if(w1i===null||w1i===undefined)continue;
      var yv=dvArr?dvArr[i]:null;
      if(yv===null||yv===undefined||isNaN(yv))continue;
      var row=[1];var ok=true;
      for(var j=0;j<ivArrs.length;j++){
        var v=ivArrs[j]?ivArrs[j][w1i]:null;
        if(v===null||v===undefined||isNaN(v)){ok=false;break;}
        row.push(v);
      }
      if(!ok)continue;
      y.push(yv);X.push(row);
    }
  } else {
    var src=wave===1?DATA.w1:DATA.w2;
    var dvArr2=src[st.dv];
    var ivArrs2=allVars.map(function(v){return src[v];});
    for(var i=0;i<n;i++){
      if(!mask[i])continue;
      var yv=dvArr2?dvArr2[i]:null;
      if(yv===null||yv===undefined||isNaN(yv))continue;
      var row=[1];var ok=true;
      for(var j=0;j<ivArrs2.length;j++){
        var v=ivArrs2[j]?ivArrs2[j][i]:null;
        if(v===null||v===undefined||isNaN(v)){ok=false;break;}
        row.push(v);
      }
      if(!ok)continue;
      y.push(yv);X.push(row);
    }
  }

  if(y.length<allVars.length+5){
    panel.appendChild(el('div','card','Insufficient data (N = '+y.length+')'));
    return;
  }

  var vnames=['(Intercept)'].concat(allVars.map(function(k){return getVarLabel(k);}));
  var result=dvIsBinary?logReg(y,X,vnames):olsReg(y,X,vnames);
  if(result.error){
    panel.appendChild(el('div','card','Model error: '+result.error));
    return;
  }

  // Model summary
  var sumCard=el('div','card');
  var tit=el('div','card-title',(dvIsBinary?'Logistic':'Linear')+' Regression');
  tit.appendChild(el('span','badge badge-accent','N = '+result.n));
  sumCard.appendChild(tit);

  var sumStats=el('div','');
  sumStats.style.fontSize='12px';sumStats.style.color='var(--text-secondary)';sumStats.style.marginBottom='10px';
  if(dvIsBinary){
    sumStats.textContent='McFadden R\u00B2 = '+fmt(result.pseudoR2,3);
  } else {
    sumStats.textContent='R\u00B2 = '+fmt(result.r2,3)+', Adj. R\u00B2 = '+fmt(result.adj_r2,3)+', F('+result.df_m+','+result.df_res+') = '+fmt(result.f_stat)+', p = '+fmtP(result.f_p);
  }
  sumCard.appendChild(sumStats);

  // Forest plot (skip intercept)
  if(!dvIsBinary){
    var maxAbs=0;
    for(var j=1;j<result.beta.length;j++){
      var hi=Math.abs(result.ci_hi[j]),lo=Math.abs(result.ci_lo[j]);
      maxAbs=Math.max(maxAbs,hi,lo);
    }
    if(maxAbs===0)maxAbs=1;

    var fArea=el('div','chart-area');
    for(var j=1;j<result.beta.length;j++){
      var row=el('div','forest-row');
      row.appendChild(el('div','forest-label',result.vn[j]));
      var track=el('div','forest-track');
      // Zero line at center
      var zl=el('div','forest-zero');
      zl.style.left='50%';
      track.appendChild(zl);
      // CI bar
      var ciLo=result.ci_lo[j],ciHi=result.ci_hi[j];
      var leftPct=50+(ciLo/maxAbs)*50;
      var rightPct=50+(ciHi/maxAbs)*50;
      leftPct=Math.max(0,Math.min(100,leftPct));
      rightPct=Math.max(0,Math.min(100,rightPct));
      var ci=el('div','forest-ci');
      ci.style.left=leftPct+'%';ci.style.width=Math.max(2,rightPct-leftPct)+'%';
      track.appendChild(ci);
      // Point estimate
      var dotPct=50+(result.beta[j]/maxAbs)*50;
      dotPct=Math.max(2,Math.min(98,dotPct));
      var dot=el('div','forest-dot');
      dot.style.left='calc('+dotPct+'% - 6px)';
      if(result.p[j]<.05)dot.style.background='var(--caution)';
      track.appendChild(dot);
      row.appendChild(track);
      row.appendChild(el('div','forest-val','b='+fmt(result.beta[j])+' '+sigStars(result.p[j])));
      fArea.appendChild(row);
    }
    sumCard.appendChild(fArea);
  }

  panel.appendChild(sumCard);

  // Coefficient table
  var tCard=el('div','card');
  tCard.appendChild(el('div','card-title','Coefficients'));
  var tbl=el('table','stats-table');
  var thead=el('thead','');
  var thr=el('tr','');
  var hdrs=dvIsBinary?['Term','B','OR','SE','z','p','95% CI']:['Term','B','SE','t','p','95% CI'];
  hdrs.forEach(function(h){thr.appendChild(el('th','',h));});
  thead.appendChild(thr);tbl.appendChild(thead);
  var tbody=el('tbody','');
  for(var j=0;j<result.beta.length;j++){
    var tr=el('tr','');
    tr.appendChild(el('td','',result.vn[j]));
    tr.appendChild(el('td','',fmt(result.beta[j],3)));
    if(dvIsBinary)tr.appendChild(el('td','',fmt(result.or[j],3)));
    tr.appendChild(el('td','',fmt(result.se[j],3)));
    tr.appendChild(el('td','',fmt(dvIsBinary?result.z[j]:result.t[j],3)));
    var ptd=el('td','',fmtP(result.p[j])+' '+sigStars(result.p[j]));
    if(result.p[j]<.05)ptd.className='sig';
    tr.appendChild(ptd);
    tr.appendChild(el('td','','['+fmt(result.ci_lo[j],3)+', '+fmt(result.ci_hi[j],3)+']'));
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);tCard.appendChild(tbl);
  panel.appendChild(tCard);

  // Narrative interpretation
  var ivLabels = allVars.map(function(k) { return getVarLabel(k); });
  var narrativeCard = generateNarrative('regression', result, { dv: getVarLabel(st.dv), ivs: ivLabels });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'regression');
  }
}

function renderMediation(panel,st){
  if(!st.medX||!st.medM||!st.medY){
    panel.appendChild(el('div','placeholder','Select X, M, and Y variables'));
    return;
  }

  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;
  var src=wave===1?DATA.w1:DATA.w2;

  var xArr=src[st.medX],mArr=src[st.medM],yArr=src[st.medY];
  var x=[],m=[],y=[];
  for(var i=0;i<n;i++){
    if(!mask[i])continue;
    var xv=xArr?xArr[i]:null,mv=mArr?mArr[i]:null,yv=yArr?yArr[i]:null;
    if(xv!==null&&!isNaN(xv)&&mv!==null&&!isNaN(mv)&&yv!==null&&!isNaN(yv)){
      x.push(xv);m.push(mv);y.push(yv);
    }
  }

  if(x.length<10){
    panel.appendChild(el('div','card','Insufficient data (N = '+x.length+')'));
    return;
  }

  var result=sobelMed(x,m,y);
  if(result.error){
    panel.appendChild(el('div','card','Mediation error: '+result.error));
    return;
  }

  // Path diagram
  var card=el('div','card');
  var tit=el('div','card-title','Mediation Analysis (Sobel Test)');
  tit.appendChild(el('span','badge badge-accent','N = '+result.n));
  card.appendChild(tit);

  var diagram=el('div','path-diagram');

  // X node

  diagram.appendChild(xNode);

  // a arrow
  var aArrow=el('div','path-arrow');
  var aCoef=el('div','coef','a = '+fmt(result.a,3)+sigStars(result.p_a));
  if(result.p_a<.05)aCoef.style.color='var(--caution)';
  aArrow.appendChild(aCoef);
  var aLine=el('div','line');aArrow.appendChild(aLine);
  diagram.appendChild(aArrow);

  // M node
  var mNode=el('div','path-node',getVarLabel(st.medM));
  diagram.appendChild(mNode);

  // b arrow
  var bArrow=el('div','path-arrow');
  var bCoef=el('div','coef','b = '+fmt(result.b,3)+sigStars(result.p_b));
  if(result.p_b<.05)bCoef.style.color='var(--caution)';
  bArrow.appendChild(bCoef);
  var bLine=el('div','line');bArrow.appendChild(bLine);
  diagram.appendChild(bArrow);

  // Y node
  var yNode=el('div','path-node',getVarLabel(st.medY));
  diagram.appendChild(yNode);

  card.appendChild(diagram);

  // Results table
  var tbl=el('table','stats-table');
  var tbody=el('tbody','');
  var rows=[
    ['Total effect (c)',fmt(result.c,3)],
    ['Direct effect (c\')',fmt(result.cp,3)],
    ['Indirect effect (a*b)',fmt(result.ab,3)],
    ['Sobel Z',fmt(result.sob_z,3)],
    ['Sobel p',fmtP(result.sob_p)+' '+sigStars(result.sob_p)],
    ['% Mediated',fmt(result.pct,1)+'%']
  ];
  rows.forEach(function(r){
    var tr=el('tr','');
    tr.appendChild(el('td','',r[0]));
    var td=el('td','',r[1]);
    if(r[0]==='Sobel p'&&result.sob_p<.05)td.className='sig';
    tr.appendChild(td);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);card.appendChild(tbl);

  // Interpretation
  var interp=el('div','');
  interp.style.fontSize='12px';interp.style.marginTop='10px';interp.style.padding='8px';
  interp.style.background='var(--bg-input)';interp.style.borderRadius='var(--radius-sm)';
  interp.style.color='var(--text-secondary)';
  if(result.sob_p<.05){
    interp.textContent='Significant mediation: '+getVarLabel(st.medM)+' mediates the relationship between '+getVarLabel(st.medX)+' and '+getVarLabel(st.medY)+' (Sobel Z = '+fmt(result.sob_z)+', p = '+fmtP(result.sob_p)+'), accounting for '+fmt(result.pct,1)+'% of the total effect.';
    interp.style.borderLeft='3px solid var(--caution)';
  } else {
    interp.textContent='No significant mediation detected (Sobel Z = '+fmt(result.sob_z)+', p = '+fmtP(result.sob_p)+').';
  }
  card.appendChild(interp);
  panel.appendChild(card);

  // Narrative interpretation
  var narrativeCard = generateNarrative('mediation', result, { x: getVarLabel(st.medX), m: getVarLabel(st.medM), y: getVarLabel(st.medY) });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'mediation');
  }
}

function renderModeration(panel,st){

  } else {
    intNote.style.background='var(--bg-input)';intNote.style.color='var(--text-secondary)';
    intNote.textContent='Interaction not significant (p = '+fmtP(intP)+'). Simple slopes shown for reference.';
  }

  slTbl.appendChild(slTb);slCard.appendChild(slTbl);

  // Slope visualization: colored bars showing slope magnitude and direction

  var sigSlopes=result.slopes.filter(function(s2){return s2.p<.05;});

    slopeNote.style.borderLeft='3px solid var(--caution)';
  } else {
    slopeNote.textContent='No simple slopes reached significance at p < .05.';

  panel.appendChild(slCard);

  // Narrative interpretation

  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'moderation');
  }

    h3.style.color=tg.color;
    h3.textContent=tg.label;
    var badge=el('span','badge '+tg.badgeCls,'N = '+counts[tg.value]);
    h3.appendChild(badge);
    tpanel.appendChild(h3);

    // Demographics for this group
    var mask=new Uint8Array(DATA.meta.w2_n);
    for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;

    // Gender breakdown
    var genderVec=getVecRaw(2,'Gender',mask);
    var gCounts={1:0,2:0,3:0};
    genderVec.forEach(function(v){if(gCounts[v]!==undefined)gCounts[v]++;});
    var gTotal=genderVec.length;
    var demDiv=el('div','');demDiv.style.fontSize='11px';demDiv.style.color='var(--text-secondary)';demDiv.style.marginBottom='8px';
    if(gTotal>0){
      demDiv.textContent='Male: '+gCounts[1]+' ('+fmt(gCounts[1]/gTotal*100,0)+'%) | Female: '+gCounts[2]+' ('+fmt(gCounts[2]/gTotal*100,0)+'%)';
    }
    tpanel.appendChild(demDiv);

    // Key scale means
    var keyVars=['DASS_Total','ECR_AI_Anxiety','ECR_AI_Avoidance','ANTRO_Mean'];
    var availVars=keyVars.filter(function(k){return DATA.w2[k];});

    if(availVars.length>0){
      var scaleDiv=el('div','');
      availVars.forEach(function(k){
        var vec=getVec(2,k,mask);
        var s=descStats(vec);
        if(s.n===0)return;

        // Also get W1 mean for matched participants
        var paired=getPairedVecs(k,mask);
        var w1s=paired?descStats(paired.w1):{n:0};

        var row=el('div','');row.style.fontSize='11px';row.style.marginBottom='4px';
        var lbl=el('span','',getVarLabel(k)+': ');lbl.style.color='var(--text-secondary)';
        row.appendChild(lbl);
        var val=el('span','','M = '+fmt(s.mean));val.style.color='var(--text-primary)';
        row.appendChild(val);

        if(w1s.n>0){
          var diff=s.mean-w1s.mean;
          var diffSpan=el('span','','  ('+(diff>=0?'+':'')+fmt(diff)+')');
          diffSpan.style.color=diff>0?'var(--error)':diff<0?'var(--success)':'var(--text-muted)';
          diffSpan.style.fontSize='10px';
          row.appendChild(diffSpan);
        }
        scaleDiv.appendChild(row);
      });
      tpanel.appendChild(scaleDiv);
    }

    grid.appendChild(tpanel);
  });
  panel.appendChild(grid);

  // Diverging bar chart: change scores
  var divCard=el('div','card');
  divCard.appendChild(el('div','card-title','Mean Change Scores (W2 - W1) by Transition Group'));

  var changeVars=['DASS_Total','DASS_Depression','DASS_Anxiety','DASS_Stress','ECR_AI_Anxiety','ECR_AI_Avoidance','ANTRO_Mean'];
  var availChangeVars=changeVars.filter(function(k){return DATA.w1[k]&&DATA.w2[k];});

  if(availChangeVars.length>0){
    var maxAbsChange=0;
    var changeData={};
    tGroups.forEach(function(tg){
      changeData[tg.value]={};
      var mask2=new Uint8Array(DATA.meta.w2_n);
      for(var i2=0;i2<DATA.meta.w2_n;i2++)mask2[i2]=DATA.matched.transition[i2]===tg.value?1:0;
      availChangeVars.forEach(function(k){
        var paired2=getPairedVecs(k,mask2);
        if(!paired2||paired2.w1.length<2){changeData[tg.value][k]={mean:0,n:0};return;}
        var diffs2=[];for(var i3=0;i3<paired2.w1.length;i3++)diffs2.push(paired2.w2[i3]-paired2.w1[i3]);
        var s2=descStats(diffs2);
        changeData[tg.value][k]={mean:s2.mean,n:s2.n};
        if(Math.abs(s2.mean)>maxAbsChange)maxAbsChange=Math.abs(s2.mean);
      });
    });
    if(maxAbsChange===0)maxAbsChange=1;

    availChangeVars.forEach(function(k){
      var secHdr=el('div','',getVarLabel(k));
      secHdr.style.fontSize='11px';secHdr.style.fontWeight='600';secHdr.style.color='var(--text-secondary)';secHdr.style.marginTop='10px';secHdr.style.marginBottom='4px';
      divCard.appendChild(secHdr);

      tGroups.forEach(function(tg){
        var cd=changeData[tg.value][k];
        if(!cd||cd.n===0)return;
        var row=el('div','div-bar-row');
        var lbl=el('div','div-bar-label',tg.label.split(' ')[0]);
        lbl.style.color=tg.color;
        row.appendChild(lbl);

        var negDiv=el('div','div-bar-neg');
        var posDiv=el('div','div-bar-pos');
        var center=el('div','div-bar-center');

        if(cd.mean<0){
          var seg=el('div','div-bar-seg');
          seg.style.background='linear-gradient(90deg, '+darkenColor(tg.color)+', '+tg.color+')';
          seg.style.width=(Math.abs(cd.mean)/maxAbsChange*100)+'%';
          negDiv.appendChild(seg);
        } else {
          var seg2=el('div','div-bar-seg');
          seg2.style.background='linear-gradient(90deg, '+tg.color+', '+darkenColor(tg.color)+')';
          seg2.style.width=(Math.abs(cd.mean)/maxAbsChange*100)+'%';
          posDiv.appendChild(seg2);
        }

        row.appendChild(negDiv);row.appendChild(center);row.appendChild(posDiv);
        row.appendChild(el('div','div-bar-val',(cd.mean>=0?'+':'')+fmt(cd.mean)));
        divCard.appendChild(row);
      });
    });
  }
  panel.appendChild(divCard);
}

/* ============================================================
   TAB 6: WAR CONTEXT
   ============================================================ */
function buildWarTab(pane){
  pane.style.flexDirection='column';

  var hbar=el('div','group-bar');
  hbar.appendChild(el('label','','War Context (Wave 2)'));
  var effN=el('span','eff-n','N = '+DATA.meta.w2_n);
  hbar.appendChild(effN);
  pane.appendChild(hbar);

  var mainPanel=el('div','main-panel');
  mainPanel.style.overflowY='auto';
  pane.appendChild(mainPanel);

  renderWarTab(mainPanel);
}

function renderWarTab(panel){
  clearEl(panel);

  // Find war variables
  var warVars=[];
  var allKeys=Object.keys(DATA.meta.vars);
  for(var i=0;i<allKeys.length;i++){
    var m=DATA.meta.vars[allKeys[i]];
    if((m.construct==='war'||allKeys[i].toLowerCase().indexOf('war')>=0||allKeys[i].toLowerCase().indexOf('duty')>=0||allKeys[i].toLowerCase().indexOf('missile')>=0)&&m.waves&&m.waves.indexOf(2)>=0){
      warVars.push(allKeys[i]);
    }
  }

  if(warVars.length===0){
    panel.appendChild(el('div','card','No war context variables found in the data.'));
    return;
  }

  // Render each war variable
  var grid=el('div','war-grid');

  warVars.forEach(function(key){
    var card=el('div','card');
    var meta=getVarMeta(key);
    card.appendChild(el('div','card-title',meta.label||key));

    var vec=getVecRaw(2,key,null);
    var counts={},total=0;
    for(var i=0;i<vec.length;i++){
      var v=vec[i];if(v===null||v===undefined)continue;
      counts[v]=(counts[v]||0)+1;total++;
    }

    if(total===0){
      card.appendChild(el('div','placeholder','No data'));
      grid.appendChild(card);
      return;
    }

    var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
    var maxC=counts[sorted[0]]||1;
    var labels=meta.labels||{};

    var area=el('div','chart-area');
    sorted.forEach(function(k,idx){
      var row=el('div','bar-row');
      var lbl=labels[k]||k;
      row.appendChild(el('div','bar-label',String(lbl)));
      var track=el('div','bar-track');
      var fill=el('div','bar-fill '+FILL_CLASSES[idx%FILL_CLASSES.length]);
      fill.style.width=(counts[k]/maxC*100)+'%';
      track.appendChild(fill);row.appendChild(track);
      row.appendChild(el('div','bar-val',counts[k]+' ('+fmt(counts[k]/total*100,1)+'%)'));
      area.appendChild(row);
    });
    card.appendChild(area);

    // N annotation
    var nNote=el('div','');nNote.style.fontSize='10px';nNote.style.color='var(--text-muted)';nNote.style.marginTop='6px';
    nNote.textContent='N = '+total;
    card.appendChild(nNote);

    grid.appendChild(card);
  });

  panel.appendChild(grid);

  // War distress by transition group
  var distressKey=null;
  for(var i=0;i<warVars.length;i++){
    if(warVars[i].toLowerCase().indexOf('distress')>=0){distressKey=warVars[i];break;}
  }

  if(distressKey){
    var dCard=el('div','card');
    dCard.appendChild(el('div','card-title','War Distress by Transition Group'));

    var tGroups=[
      {value:0,label:'Never',color:'#8b98a5'},
      {value:1,label:'Adopter',color:'#6dd8a0'},
      {value:2,label:'Continuer',color:'#5ba8e0'},
      {value:3,label:'Discontinuer',color:'#e09090'}
    ];

    var stats=[];
    tGroups.forEach(function(tg){
      var mask=new Uint8Array(DATA.meta.w2_n);
      for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;
      var vec=getVec(2,distressKey,mask);
      var s=descStats(vec);
      s.label=tg.label;s.color=tg.color;
      stats.push(s);
    });

    var maxM=0;
    stats.forEach(function(s){if(s.n>0&&s.mean+s.sd>maxM)maxM=s.mean+s.sd;});
    if(maxM===0)maxM=1;

    var area2=el('div','chart-area');
    stats.forEach(function(s){
      if(s.n===0)return;
      var row=el('div','bar-row');
      row.appendChild(el('div','bar-label',s.label));
      var track=el('div','bar-track');
      var fill=el('div','bar-fill');
      fill.style.background='linear-gradient(90deg, '+darkenColor(s.color)+', '+s.color+')';
      fill.style.width=(s.mean/maxM*100)+'%';
      track.appendChild(fill);row.appendChild(track);
      row.appendChild(el('div','bar-val','M='+fmt(s.mean)+' (N='+s.n+')'));
      area2.appendChild(row);
    });
    dCard.appendChild(area2);

    // Stats table
    var tbl=el('table','stats-table');
    var thead=el('thead','');
    var thr=el('tr','');
    ['Group','N','Mean','SD'].forEach(function(h){thr.appendChild(el('th','',h));});
    thead.appendChild(thr);tbl.appendChild(thead);
    var tbody=el('tbody','');
    stats.forEach(function(s){
      if(s.n===0)return;
      var tr=el('tr','');
      tr.appendChild(el('td','',s.label));
      tr.appendChild(el('td','',String(s.n)));
      tr.appendChild(el('td','',fmt(s.mean)));
      tr.appendChild(el('td','',fmt(s.sd)));
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);dCard.appendChild(tbl);
    panel.appendChild(dCard);
  }

  // Summary stats card
  var sumCard=el('div','card');
  sumCard.appendChild(el('div','card-title','War Context Summary'));

  // Compute key stats
  var harmKey=warVars.find(function(k){return k.toLowerCase().indexOf('harm')>=0;});
  var houseKey=warVars.find(function(k){return k.toLowerCase().indexOf('house')>=0||k.toLowerCase().indexOf('evacu')>=0;});
  var missileKey=warVars.find(function(k){return k.toLowerCase().indexOf('missile')>=0;});

  var summaryItems=[];
  if(harmKey){
    var hVec=getVecRaw(2,harmKey,null);
    var harmed=0;hVec.forEach(function(v){if(v!==null&&v!==0&&v!=='0')harmed++;});
    summaryItems.push({label:'Reported any war harm',value:hVec.length>0?harmed+'/'+hVec.length+' ('+fmt(harmed/hVec.length*100,1)+'%)':'N/A'});
  }
  if(houseKey){
    var eVec=getVecRaw(2,houseKey,null);
    var evac=0;eVec.forEach(function(v){if(v===1||v==='1')evac++;});
    summaryItems.push({label:'Evacuated from home',value:eVec.length>0?evac+'/'+eVec.length+' ('+fmt(evac/eVec.length*100,1)+'%)':'N/A'});
  }
  if(missileKey){
    var mVec=getVecRaw(2,missileKey,null);
    var exposed=0;mVec.forEach(function(v){if(v===1||v==='1')exposed++;});
    summaryItems.push({label:'Missile exposure',value:mVec.length>0?exposed+'/'+mVec.length+' ('+fmt(exposed/mVec.length*100,1)+'%)':'N/A'});
  }
  if(distressKey){
    var dVec=getVec(2,distressKey,null);
    var dStats=descStats(dVec);
    summaryItems.push({label:'Mean war distress',value:fmt(dStats.mean)+' (SD = '+fmt(dStats.sd)+')'});
  }

  if(summaryItems.length>0){
    var sTbl=el('table','stats-table');
    var sTb=el('tbody','');
    summaryItems.forEach(function(item){
      var tr=el('tr','');
      tr.appendChild(el('td','',item.label));
      tr.appendChild(el('td','',item.value));
      sTb.appendChild(tr);
    });
    sTbl.appendChild(sTb);sumCard.appendChild(sTbl);
  } else {
    sumCard.appendChild(el('div','','Compute summary statistics from available war variables.'));
  }
  panel.appendChild(sumCard);
}

/* ============================================================
   INIT
   ============================================================ */
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initAuth);
} else {
  initAuth();
}

})();
</script>
