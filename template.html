  tGroups.forEach(function(tg){
    var mask=new Uint8Array(DATA.meta.w2_n);
    for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;
    var paired=getPairedVecs(key,mask);
    if(!paired||paired.w1.length<2)return;

    var card=el('div','card');
    card.style.borderLeftColor=tg.color;card.style.borderLeftWidth='3px';

    if(isContinuous(key)){
      var s1=descStats(paired.w1),s2=descStats(paired.w2);
      var tit=el('div','card-title',tg.label);
      tit.appendChild(el('span','badge badge-muted','N = '+paired.w1.length));
      card.appendChild(tit);

      var maxM=Math.max(s1.mean+s1.sd,s2.mean+s2.sd);if(maxM===0)maxM=1;
      var area=el('div','chart-area');
      [{l:'W1',s:s1,cls:'bar-fill-blue'},{l:'W2',s:s2,cls:'bar-fill-orange'}].forEach(function(w){
        var row=el('div','bar-row');
        row.appendChild(el('div','bar-label',w.l));
        var track=el('div','bar-track');var fill=el('div','bar-fill '+w.cls);
        fill.style.width=(w.s.mean/maxM*100)+'%';track.appendChild(fill);row.appendChild(track);
        row.appendChild(el('div','bar-val','M='+fmt(w.s.mean)));
        area.appendChild(row);
      });
      card.appendChild(area);

      var diffs=[];for(var i=0;i<paired.w1.length;i++)diffs.push(paired.w2[i]-paired.w1[i]);
      var pt=pairedT(diffs);
      var te=el('div','','');te.style.fontSize='11px';te.style.color='var(--text-secondary)';te.style.marginTop='6px';
      te.textContent='t('+pt.df+')='+fmt(pt.t)+', p='+fmtP(pt.p)+' '+sigStars(pt.p);
      if(pt.p<.05)te.style.color='var(--caution)';
      card.appendChild(te);
    }
    panel.appendChild(card);
  });
}

function updateAdvStepBar(st){
  var bar=document.getElementById('adv-step-bar');
  if(!bar)return;
  var items=bar.querySelectorAll('.step-item');
  // Determine current step
  var hasMode=!!st.mode;
  var hasVars=false;
  if(st.mode==='correlation')hasVars=st.selVars.length>=2;
  else if(st.mode==='regression')hasVars=!!st.dv&&st.ivs.length>0;
  else if(st.mode==='mediation')hasVars=!!st.medX&&!!st.medM&&!!st.medY;
  else if(st.mode==='moderation')hasVars=!!st.modDV&&!!st.modIV&&!!st.modMod;
  var curStep=hasVars?2:(hasMode?1:0);
  items.forEach(function(si){
    var s=parseInt(si.dataset.step);
    si.classList.remove('active','done');
    if(s<curStep)si.classList.add('done');
    else if(s===curStep)si.classList.add('active');
  });
}

      // Set variables
      if(rq.mode==='regression'){
        st.dv=rq.dv;st.ivs=rq.ivs.slice();
      } else if(rq.mode==='mediation'){
        st.medX=rq.medX;st.medM=rq.medM;st.medY=rq.medY;
      } else if(rq.mode==='moderation'){
        st.modDV=rq.modDV;st.modIV=rq.modIV;st.modMod=rq.modMod;
      } else if(rq.mode==='correlation'){
        st.selVars=rq.selVars.slice();
      }

      // Hide RQ cards
      area.style.display='none';

      // Re-render config and results
      renderAdvConfig(configArea,st);
      renderAdvResults(resultsPanel,st);
      updateAdvStepBar(st);

      // Scroll to results
      resultsPanel.scrollIntoView({behavior:'smooth'});
    });

    grid.appendChild(card);
  });
  area.appendChild(grid);
}

function getAdvFilter(st){
  var f={};
  if(st.filterPreset==='aimh')f.aimh=1;
  if(st.filterPreset==='nodisc')f.excludeDiscontinuers=true;
  return f;
}

function getAdvWave(st){return st.waveMode==='w2'||st.waveMode==='cross'?2:1;}
function getContinuousVars(wave){
  // Include continuous AND ordinal (treated numerically)
  return getVarsForWave(wave).filter(function(k){var m=getVarMeta(k);return m&&(m.type==='continuous'||m.type==='ordinal');});
}
function getAllAnalysisVars(wave){
  // Include continuous, ordinal, AND binary (can be DV for logistic, or moderator)
  return getVarsForWave(wave).filter(function(k){var m=getVarMeta(k);return m&&(m.type==='continuous'||m.type==='ordinal'||m.type==='binary');});
}

        var pool=getContinuousVars(waveNum);

      {lbl:'DV — Outcome',hint:'The variable being predicted. Must be continuous or ordinal.'},

    ];
    modLabels.forEach(function(info,idx){
      var g=el('div','config-group');

      var labText=document.createElement('span');labText.textContent=info.lbl+' ';lab.appendChild(labText);
      var wN=modWaves[idx];
      var wBadge=document.createElement('span');
      wBadge.style.cssText='background:'+getWaveBg(wN)+';color:'+getWaveColor(wN)+';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;';
      wBadge.textContent='WAVE '+wN;
      lab.appendChild(wBadge);
      g.appendChild(lab);
      g.appendChild(hint(info.hint));
      var sel=el('select','');
      sel.style.borderLeft='4px solid '+getWaveColor(wN);
      sel.appendChild(el('option','','-- Select --'));
      var pool;
      if(idx===0){pool=st.waveMode==='cross'?getContinuousVars(2):contVars;}
      else{pool=st.waveMode==='cross'?getAllAnalysisVars(1):allVars;}
      pool.forEach(function(k){var o=el('option','',labelForWave(k,wN));o.value=k;sel.appendChild(o);});
      var prop=['modDV','modIV','modMod'][idx];
      sel.value=st[prop]||'';
      sel.addEventListener('change',function(){st[prop]=sel.value;renderAdvResults(document.getElementById('adv-results'),st);});
      g.appendChild(sel);area.appendChild(g);
    });
  }
}

    // Variable name
    var name=el('div','');
    name.style.cssText='flex:1;font-size:14px;font-weight:600;color:var(--text-primary);';
    name.textContent=getVarLabel(varKey);
    row.appendChild(name);
    // Source hint
    var src=el('div','');
    src.style.cssText='font-size:10px;color:var(--text-muted);font-style:italic;';
    src.textContent=waveN===1?'Nov 2025':'Mar 2026';
    row.appendChild(src);
    return row;
  }
  if(st.mode==='correlation'){
    if(!st.selVars||st.selVars.length===0)return null;
    var isCross=st.waveMode==='cross';
    st.selVars.forEach(function(v,i){
      var k=v,wN;
      if(isCross&&v.indexOf('w1:')===0){k=v.substring(3);wN=1;}
      else if(isCross&&v.indexOf('w2:')===0){k=v.substring(3);wN=2;}
      else {wN=getAdvWave(st);}
      var row=makeVarRow('Variable '+(i+1),k,wN,'var(--accent)');
      if(row)box.appendChild(row);
    });
  } else if(st.mode==='regression'){
    var dvWaveN=st.waveMode==='cross'||st.waveMode==='w2'?2:1;
    var ivWaveN=st.waveMode==='cross'||st.waveMode==='w1'?1:2;
    var dvRow=makeVarRow('Outcome (DV)',st.dv,dvWaveN,getWaveColor(dvWaveN));
    if(dvRow)box.appendChild(dvRow);
    (st.ivs||[]).forEach(function(iv,i){
      var r=makeVarRow('Predictor '+(i+1),iv,ivWaveN,getWaveColor(ivWaveN));
      if(r)box.appendChild(r);
    });
  } else if(st.mode==='mediation'){
    var xW=st.waveMode==='cross'?1:getAdvWave(st);
    var mW=st.waveMode==='cross'?1:getAdvWave(st);
    var yW=st.waveMode==='cross'?2:getAdvWave(st);
    var rX=makeVarRow('X \u2014 Predictor',st.medX,xW,getWaveColor(xW));if(rX)box.appendChild(rX);
    var rM=makeVarRow('M \u2014 Mediator',st.medM,mW,getWaveColor(mW));if(rM)box.appendChild(rM);
    var rY=makeVarRow('Y \u2014 Outcome',st.medY,yW,getWaveColor(yW));if(rY)box.appendChild(rY);
  } else if(st.mode==='moderation'){
    var dvW=st.waveMode==='cross'?2:getAdvWave(st);
    var ivW=st.waveMode==='cross'?1:getAdvWave(st);
    var mW2=st.waveMode==='cross'?1:getAdvWave(st);
    var rDV=makeVarRow('DV \u2014 Outcome',st.modDV,dvW,getWaveColor(dvW));if(rDV)box.appendChild(rDV);
    var rIV=makeVarRow('IV \u2014 Predictor',st.modIV,ivW,getWaveColor(ivW));if(rIV)box.appendChild(rIV);
    var rMod=makeVarRow('Moderator',st.modMod,mW2,getWaveColor(mW2));if(rMod)box.appendChild(rMod);
  }
  // Cross-wave note
  if(st.waveMode==='cross'){
    var note=el('div','');
    note.style.cssText='margin-top:10px;padding:8px 12px;background:rgba(184,160,224,.15);border-radius:6px;font-size:11px;color:var(--purple);font-weight:600;';
    note.textContent='\uD83D\uDD04 CROSS-WAVE ANALYSIS: W1 predictors (Nov 2025) explain W2 outcomes (Mar 2026), 5 months apart';
    box.appendChild(note);
  }
  return box;
}

function renderCorrelation(panel,st){
  if(st.selVars.length<2){
    panel.appendChild(el('div','placeholder','Select at least 2 variables'));
    return;
  }
  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var isCrossCorr=st.waveMode==='cross';
  var mask=buildMask(wave,filters);

  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;
  var src=wave===1?DATA.w1:DATA.w2;
  var vars=st.selVars;

  // In cross-wave mode, each selected variable has an explicit wave assignment
  // Variable keys may be prefixed: "w1:VarName" or "w2:VarName"
  // For non-cross mode, variables are all from the current wave
  function splitKey(k){
    if(isCrossCorr){
      if(k.indexOf('w1:')===0)return{wave:1,key:k.substring(3)};
      if(k.indexOf('w2:')===0)return{wave:2,key:k.substring(3)};
      // Fallback: default to the variable's primary wave if unprefixed
      var m=getVarMeta(k);
      var wv=(m.waves&&m.waves[0])||1;
      return{wave:wv,key:k};
    }
    return{wave:wave,key:k};
  }
  var varInfo=vars.map(splitKey);

  // Compute pairwise correlations using correct wave source per variable
  var nv=vars.length;
  var rMat=[],pMat=[],nMat=[];
  for(var i=0;i<nv;i++){rMat[i]=[];pMat[i]=[];nMat[i]=[];
    for(var j=0;j<nv;j++){
      if(i===j){rMat[i][j]=1;pMat[i][j]=0;nMat[i][j]=0;continue;}
      var x=[],y=[];
      var vi=varInfo[i],vj=varInfo[j];
      if(isCrossCorr){
        // Use matched.link to align participants across waves
        var wi1=vi.wave===1?DATA.w1:DATA.w2;
        var wj1=vj.wave===1?DATA.w1:DATA.w2;
        var ai=wi1[vi.key],aj=wj1[vj.key];
        for(var k=0;k<DATA.meta.w2_n;k++){
          if(!mask[k])continue;
          var w1i=DATA.matched.link[k];
          if(w1i===null||w1i===undefined)continue;
          var idxI=vi.wave===1?w1i:k;
          var idxJ=vj.wave===1?w1i:k;
          var a=ai?ai[idxI]:null,b=aj?aj[idxJ]:null;
          if(a!==null&&a!==undefined&&!isNaN(a)&&b!==null&&b!==undefined&&!isNaN(b)){x.push(a);y.push(b);}
        }
      } else {
        var ai=src[vi.key],aj=src[vj.key];
        for(var k=0;k<n;k++){
          if(!mask[k])continue;
          var a=ai?ai[k]:null,b=aj?aj[k]:null;
          if(a!==null&&a!==undefined&&!isNaN(a)&&b!==null&&b!==undefined&&!isNaN(b)){x.push(a);y.push(b);}
        }
      }
      var pr=pearsonR(x,y);
      rMat[i][j]=pr.r;pMat[i][j]=pr.p;nMat[i][j]=x.length;
    }
  }

  // Helper: nice label ALWAYS prefixed with [W1] or [W2]
  function vLabel(idx){
    var vi=varInfo[idx];
    return '[W'+vi.wave+'] '+getVarLabel(vi.key);
  }

  // "What you're testing" summary card
  var varLabels=[];for(var vli=0;vli<nv;vli++)varLabels.push(vLabel(vli));
  var testCard=el('div','');
  testCard.style.cssText='background:rgba(91,168,224,.06);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:1.6;';
  var testTitle=el('div','');
  testTitle.style.cssText='font-weight:600;color:var(--accent);margin-bottom:6px;';
  testTitle.textContent='What you are testing';
  testCard.appendChild(testTitle);
  var testQ=el('div','');
  testQ.textContent='How strongly are these '+nv+' variables linearly associated with each other?';
  testCard.appendChild(testQ);
  var testDetail=el('div','');
  testDetail.style.cssText='color:var(--text-secondary);font-size:12px;margin-top:6px;';
  testDetail.textContent='Variables: '+varLabels.join(', ')+' \u2022 '+(nv*(nv-1)/2)+' pairwise correlations';
  testCard.appendChild(testDetail);
  panel.appendChild(testCard);

  // Heatmap (use full labels; CSS handles overflow with ellipsis + hover title)
  var card=el('div','card');
  var corTit=el('div','card-title','Correlation Matrix');
  var corExp=makeExportBtn('Export CSV',function(){
    var rows2=[];
    // Header row
    var hdr=[''];for(var j=0;j<nv;j++)hdr.push(vLabel(j));rows2.push(hdr);
    for(var i=0;i<nv;i++){
      var row=[vLabel(i)];
      for(var j=0;j<nv;j++)row.push(rMat[i][j].toFixed(4));
      rows2.push(row);
    }
    rows2.push([]);rows2.push(['Pairwise (pair, r, p, N)']);
    for(var i=0;i<nv;i++){for(var j=i+1;j<nv;j++){
      rows2.push([vLabel(i)+' x '+vLabel(j),rMat[i][j].toFixed(4),pMat[i][j].toFixed(6),nMat[i][j]]);
    }}
    downloadCSV(rows2,'correlation_matrix.csv');
  });
  corTit.appendChild(corExp);
  card.appendChild(corTit);

  var tbl=el('table','heatmap');
  var thead=el('thead','');
  var thr=el('tr','');
  thr.appendChild(el('th','',''));
  for(var j=0;j<nv;j++){
    var th=el('th','',vLabel(j));
    th.title=vLabel(j);
    th.style.maxWidth='120px';
    th.style.overflow='hidden';
    th.style.textOverflow='ellipsis';
    th.style.whiteSpace='nowrap';
    thr.appendChild(th);
  }
  thead.appendChild(thr);tbl.appendChild(thead);

  var tbody=el('tbody','');
  for(var i=0;i<nv;i++){
    var tr=el('tr','');
    var rlabel=el('th','',vLabel(i));
    rlabel.title=vLabel(i);rlabel.style.textAlign='right';
    rlabel.style.maxWidth='140px';
    rlabel.style.overflow='hidden';
    rlabel.style.textOverflow='ellipsis';
    rlabel.style.whiteSpace='nowrap';
    tr.appendChild(rlabel);
    for(var j=0;j<nv;j++){
      var td=el('td','',fmt(rMat[i][j])+sigStars(pMat[i][j]));
      var absR=Math.abs(rMat[i][j]);
      var alpha=Math.min(0.7,absR);
      if(i===j)td.style.background='rgba(91,168,224,0.1)';
      else if(rMat[i][j]>0)td.style.background='rgba(109,216,160,'+alpha+')';
      else td.style.background='rgba(224,144,144,'+alpha+')';
      td.style.color=absR>0.3?'#fff':'var(--text-primary)';
      td.style.fontSize='11px';
      td.title=vLabel(i)+' x '+vLabel(j)+': r='+fmt(rMat[i][j],3)+', p='+fmtP(pMat[i][j])+', N='+nMat[i][j];
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  card.appendChild(tbl);
  panel.appendChild(card);

  // Detail table (full labels, title tooltip for long pairs)
  var dCard=el('div','card');
  dCard.appendChild(el('div','card-title','Pairwise Correlations'));
  var dtbl=el('table','stats-table');
  var dth=el('thead','');
  var dthr=el('tr','');
  ['Pair','r','p','N','Sig'].forEach(function(h){dthr.appendChild(el('th','',h));});
  dth.appendChild(dthr);dtbl.appendChild(dth);
  var dtb=el('tbody','');
  for(var i=0;i<nv;i++){
    for(var j=i+1;j<nv;j++){
      var tr=el('tr','');
      var pairText=vLabel(i)+' \u00D7 '+vLabel(j);
      var pairCell=el('td','',pairText);pairCell.title=pairText;
      tr.appendChild(pairCell);
      tr.appendChild(el('td','',fmt(rMat[i][j],3)));
      var ptd=el('td','',fmtP(pMat[i][j]));if(pMat[i][j]<.05)ptd.className='sig';
      tr.appendChild(ptd);
      tr.appendChild(el('td','',String(nMat[i][j])));
      var stEl=el('td','',sigStars(pMat[i][j]));if(pMat[i][j]<.05)stEl.className='sig';
      tr.appendChild(stEl);
      dtb.appendChild(tr);
    }
  }
  dtbl.appendChild(dtb);dCard.appendChild(dtbl);
  panel.appendChild(dCard);

  // Narrative interpretation for correlation
  var corPairs = [];
  var corN = 0;
  for (var ci = 0; ci < nv; ci++) {
    for (var cj = ci + 1; cj < nv; cj++) {
      corPairs.push({ label1: vLabel(ci), label2: vLabel(cj), r: rMat[ci][cj], p: pMat[ci][cj] });
      if (nMat[ci][cj] > corN) corN = nMat[ci][cj];
    }
  }
  var narrativeCard = generateNarrative('correlation', { pairs: corPairs, n: corN }, { vars: varLabels });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'correlation');
  }
}

function renderRegression(panel,st){
  if(!st.dv||st.ivs.length===0){
    panel.appendChild(el('div','placeholder','Select a DV and at least one IV'));
    return;
  }

  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);
  var isCross=st.waveMode==='cross';
  var dvIsBinary=isBinary(st.dv);

  // Build aligned data
  var allVars=st.ivs.slice();
  var y=[],X=[];
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;

  if(isCross){
    // IVs from W1 (via matched.link), DV from W2
    var dvArr=DATA.w2[st.dv];
    var ivArrs=allVars.map(function(v){return DATA.w1[v];});
    for(var i=0;i<DATA.meta.w2_n;i++){
      if(!mask[i])continue;
      var w1i=DATA.matched.link[i];
      if(w1i===null||w1i===undefined)continue;
      var yv=dvArr?dvArr[i]:null;
      if(yv===null||yv===undefined||isNaN(yv))continue;
      var row=[1];var ok=true;
      for(var j=0;j<ivArrs.length;j++){
        var v=ivArrs[j]?ivArrs[j][w1i]:null;
        if(v===null||v===undefined||isNaN(v)){ok=false;break;}
        row.push(v);
      }
      if(!ok)continue;
      y.push(yv);X.push(row);
    }
  } else {
    var src=wave===1?DATA.w1:DATA.w2;
    var dvArr2=src[st.dv];
    var ivArrs2=allVars.map(function(v){return src[v];});
    for(var i=0;i<n;i++){
      if(!mask[i])continue;
      var yv=dvArr2?dvArr2[i]:null;
      if(yv===null||yv===undefined||isNaN(yv))continue;
      var row=[1];var ok=true;
      for(var j=0;j<ivArrs2.length;j++){
        var v=ivArrs2[j]?ivArrs2[j][i]:null;
        if(v===null||v===undefined||isNaN(v)){ok=false;break;}
        row.push(v);
      }
      if(!ok)continue;
      y.push(yv);X.push(row);
    }
  }

  if(y.length<allVars.length+5){
    panel.appendChild(el('div','card','Insufficient data (N = '+y.length+')'));
    return;
  }

  // In cross-wave mode, label IVs as [W1] and DV as [W2] for clarity
  // Always include wave in variable labels — cross mode uses src arg, same-wave uses current wave
  var currWave=getAdvWave(st);
  function crossLabel(k,src){
    if(isCross)return '[' +src+ '] '+getVarLabel(k);
    return '[W'+currWave+'] '+getVarLabel(k);
  }
  var vnames=['(Intercept)'].concat(allVars.map(function(k){return crossLabel(k,'W1');}));
  var result=dvIsBinary?logReg(y,X,vnames):olsReg(y,X,vnames);
  if(result.error){
    panel.appendChild(el('div','card','Model error: '+result.error));
    return;
  }

  // Hierarchical comparison (linear only): build null model with Age + Gender from same data source as IVs
  var hierResult=null;
  if(!dvIsBinary&&st.hierarchical){
    var ageKey='Age',genKey='Gender';
    // Build null design matrix using same y/X rows (must include Age & Gender for the rows used)
    var srcH=isCross?DATA.w1:(wave===1?DATA.w1:DATA.w2);
    var ageArr=srcH[ageKey],genArr=srcH[genKey];
    // Rebuild aligned data for null model using the same filter + rows logic as primary
    var yH=[],XH=[];
    if(isCross){
      var dvArrH=DATA.w2[st.dv];
      for(var i=0;i<DATA.meta.w2_n;i++){
        if(!mask[i])continue;
        var w1i=DATA.matched.link[i];if(w1i===null||w1i===undefined)continue;
        var yv=dvArrH?dvArrH[i]:null;if(yv===null||yv===undefined||isNaN(yv))continue;
        var av=ageArr?ageArr[w1i]:null,gv=genArr?genArr[w1i]:null;
        if(av===null||av===undefined||isNaN(av)||gv===null||gv===undefined||isNaN(gv))continue;
        // Also require all selected IVs present so sample matches full model
        var okH=true;for(var jj=0;jj<allVars.length;jj++){var arrH=DATA.w1[allVars[jj]];var vv=arrH?arrH[w1i]:null;if(vv===null||vv===undefined||isNaN(vv)){okH=false;break;}}
        if(!okH)continue;
        yH.push(yv);XH.push([1,av,gv]);
      }
    } else {
      var srcDv=wave===1?DATA.w1:DATA.w2;
      var dvArrH=srcDv[st.dv];
      for(var i=0;i<n;i++){
        if(!mask[i])continue;
        var yv=dvArrH?dvArrH[i]:null;if(yv===null||yv===undefined||isNaN(yv))continue;
        var av=ageArr?ageArr[i]:null,gv=genArr?genArr[i]:null;
        if(av===null||av===undefined||isNaN(av)||gv===null||gv===undefined||isNaN(gv))continue;
        var okH=true;for(var jj=0;jj<allVars.length;jj++){var arrH=srcDv[allVars[jj]];var vv=arrH?arrH[i]:null;if(vv===null||vv===undefined||isNaN(vv)){okH=false;break;}}
        if(!okH)continue;
        yH.push(yv);XH.push([1,av,gv]);
      }
    }
    if(yH.length>=5&&yH.length===y.length){
      var nullRes=olsReg(yH,XH,['(Intercept)','Age','Gender']);
      if(!nullRes.error){
        // F-change: ((R2_full - R2_null)/(k2-k1)) / ((1-R2_full)/(n-k2-1))
        var k1=XH[0].length-1,k2=X[0].length-1;
        var deltaR2=result.r2-nullRes.r2;
        var fChange=0,pChange=1;
        if(k2>k1&&1-result.r2>0){
          fChange=(deltaR2/(k2-k1))/((1-result.r2)/(result.n-k2-1));
          pChange=1-fCDF(fChange,k2-k1,result.n-k2-1);
        }
        hierResult={nullR2:nullRes.r2,fullR2:result.r2,deltaR2:deltaR2,f:fChange,df1:k2-k1,df2:result.n-k2-1,p:pChange,nullAdjR2:nullRes.adj_r2};
      }
    }
  }

  // "What you're testing" summary card
  var dvL=crossLabel(st.dv,'W2');
  var ivLabels=st.ivs.map(function(k){return crossLabel(k,'W1');});
  var testCard=el('div','');
  testCard.style.cssText='background:rgba(91,168,224,.06);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:1.6;';
  var testTitle=el('div','');
  testTitle.style.cssText='font-weight:600;color:var(--accent);margin-bottom:6px;';
  testTitle.textContent='What you are testing';
  testCard.appendChild(testTitle);
  var testQ=el('div','');
  testQ.textContent='Do '+ivLabels.join(', ')+' predict '+dvL+'?';
  testCard.appendChild(testQ);
  var testDetail=el('div','');
  testDetail.style.cssText='color:var(--text-secondary);font-size:12px;margin-top:6px;';
  testDetail.textContent='Outcome (DV): '+dvL+(dvIsBinary?' [binary \u2014 logistic regression]':' [continuous \u2014 linear regression]')+' \u2022 '+st.ivs.length+' predictor'+(st.ivs.length>1?'s':'')+' \u2022 N = '+result.n;
  testCard.appendChild(testDetail);
  panel.appendChild(testCard);

  // Model summary
  var sumCard=el('div','card');
  var tit=el('div','card-title',(dvIsBinary?'Logistic':'Linear')+' Regression Results');
  tit.appendChild(el('span','badge badge-accent','N = '+result.n));
  // Export button (CSV of coefficients)
  var exportBtn=makeExportBtn('Export CSV',function(){
    var rows=[];
    rows.push(['Term','B',dvIsBinary?'OR':'Beta_std','SE',dvIsBinary?'z':'t','p','CI_lo','CI_hi']);
    for(var j=0;j<result.beta.length;j++){
      rows.push([
        result.vn[j],
        result.beta[j].toFixed(6),
        dvIsBinary?result.or[j].toFixed(6):(stdBetas&&stdBetas[j]!=null?stdBetas[j].toFixed(6):''),
        result.se[j].toFixed(6),
        (dvIsBinary?result.z[j]:result.t[j]).toFixed(6),
        result.p[j].toFixed(6),
        result.ci_lo[j].toFixed(6),
        result.ci_hi[j].toFixed(6)
      ]);
    }
    rows.push([]);
    if(dvIsBinary){
      rows.push(['McFadden_R2',result.pseudoR2.toFixed(6)]);
    }else{
      rows.push(['R2',result.r2.toFixed(6)]);
      rows.push(['Adj_R2',result.adj_r2.toFixed(6)]);
      rows.push(['F',result.f_stat.toFixed(6),'df_m',result.df_m,'df_res',result.df_res,'p',result.f_p.toFixed(6)]);
    }
    rows.push(['N',result.n]);
    downloadCSV(rows,'regression_'+(st.dv||'model')+'.csv');
  });
  tit.appendChild(exportBtn);
  sumCard.appendChild(tit);

  var sumStats=el('div','');
  sumStats.style.fontSize='12px';sumStats.style.color='var(--text-secondary)';sumStats.style.marginBottom='10px';
  if(dvIsBinary){
    sumStats.textContent='McFadden R\u00B2 = '+fmt(result.pseudoR2,3);
  } else {
    sumStats.textContent='R\u00B2 = '+fmt(result.r2,3)+', Adj. R\u00B2 = '+fmt(result.adj_r2,3)+', F('+result.df_m+','+result.df_res+') = '+fmt(result.f_stat)+', p = '+fmtP(result.f_p);
  }
  sumCard.appendChild(sumStats);

  // Hierarchical comparison display (linear only)
  if(hierResult){
    var hCard=el('div','');
    hCard.style.cssText='background:var(--bg-input);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--text-secondary);border-left:3px solid '+(hierResult.p<.05?'var(--success)':'var(--border)')+';';
    var hTit=el('div','');hTit.style.cssText='font-weight:600;color:var(--accent);margin-bottom:4px;font-size:11px;';
    hTit.textContent='Hierarchical comparison (vs Age + Gender only)';hCard.appendChild(hTit);
    var hBody=el('div','');
    hBody.textContent='Model 1 (null, Age+Gender): R\u00B2 = '+fmt(hierResult.nullR2,3)+
      ' \u2022 Model 2 (full): R\u00B2 = '+fmt(hierResult.fullR2,3)+
      ' \u2022 \u0394R\u00B2 = '+fmt(hierResult.deltaR2,3)+
      ' \u2022 F('+hierResult.df1+','+hierResult.df2+') = '+fmt(hierResult.f,2)+
      ', p = '+fmtP(hierResult.p)+' '+sigStars(hierResult.p);
    hCard.appendChild(hBody);
    sumCard.appendChild(hCard);
  }

  // Forest plot (skip intercept) — for both linear (B coefficients) and logistic (OR on log scale)
  if(!dvIsBinary){
    var maxAbs=0;
    for(var j=1;j<result.beta.length;j++){
      var hi=Math.abs(result.ci_hi[j]),lo=Math.abs(result.ci_lo[j]);
      maxAbs=Math.max(maxAbs,hi,lo);
    }
    if(maxAbs===0)maxAbs=1;

    var fArea=el('div','chart-area');
    for(var j=1;j<result.beta.length;j++){
      var row=el('div','forest-row');
      row.appendChild(el('div','forest-label',result.vn[j]));
      var track=el('div','forest-track');
      var zl=el('div','forest-zero');
      zl.style.left='50%';
      track.appendChild(zl);
      var ciLo=result.ci_lo[j],ciHi=result.ci_hi[j];
      var leftPct=50+(ciLo/maxAbs)*50;
      var rightPct=50+(ciHi/maxAbs)*50;
      leftPct=Math.max(0,Math.min(100,leftPct));
      rightPct=Math.max(0,Math.min(100,rightPct));
      var ci=el('div','forest-ci');
      ci.style.left=leftPct+'%';ci.style.width=Math.max(2,rightPct-leftPct)+'%';
      track.appendChild(ci);
      var dotPct=50+(result.beta[j]/maxAbs)*50;
      dotPct=Math.max(2,Math.min(98,dotPct));
      var dot=el('div','forest-dot');
      dot.style.left='calc('+dotPct+'% - 6px)';
      if(result.p[j]<.05)dot.style.background='var(--caution)';
      track.appendChild(dot);
      row.appendChild(track);
      row.appendChild(el('div','forest-val','b='+fmt(result.beta[j])+' '+sigStars(result.p[j])));
      fArea.appendChild(row);
    }
    sumCard.appendChild(fArea);
  } else {
    // Logistic: OR forest plot on log scale centered at 1
    var maxLog=0;
    for(var j=1;j<result.beta.length;j++){
      var lnOR=Math.abs(Math.log(result.or[j]));
      var lnLo=Math.abs(Math.log(result.ci_lo[j]));
      var lnHi=Math.abs(Math.log(result.ci_hi[j]));
      maxLog=Math.max(maxLog,lnOR,lnLo,lnHi);
    }
    if(!isFinite(maxLog)||maxLog===0)maxLog=1;
    var forestHdr=el('div','');
    forestHdr.style.cssText='font-size:11px;color:var(--text-muted);margin-bottom:6px;';
    forestHdr.textContent='Odds Ratios (log scale, centered at OR=1). If CI crosses 1, the predictor is not significant.';
    sumCard.appendChild(forestHdr);
    var fAreaLog=el('div','chart-area');
    for(var j=1;j<result.beta.length;j++){
      var row=el('div','forest-row');
      row.appendChild(el('div','forest-label',result.vn[j]));
      var track=el('div','forest-track');
      var zl=el('div','forest-zero');
      zl.style.left='50%';
      track.appendChild(zl);
      var lnLo=Math.log(result.ci_lo[j]),lnHi=Math.log(result.ci_hi[j]),lnOR=Math.log(result.or[j]);
      var leftPct=50+(lnLo/maxLog)*50;
      var rightPct=50+(lnHi/maxLog)*50;
      leftPct=Math.max(0,Math.min(100,leftPct));
      rightPct=Math.max(0,Math.min(100,rightPct));
      var ci=el('div','forest-ci');
      ci.style.left=leftPct+'%';ci.style.width=Math.max(2,rightPct-leftPct)+'%';
      track.appendChild(ci);
      var dotPct=50+(lnOR/maxLog)*50;
      dotPct=Math.max(2,Math.min(98,dotPct));
      var dot=el('div','forest-dot');
      dot.style.left='calc('+dotPct+'% - 6px)';
      if(result.p[j]<.05)dot.style.background='var(--caution)';
      track.appendChild(dot);
      row.appendChild(track);
      row.appendChild(el('div','forest-val','OR='+fmt(result.or[j],2)+' '+sigStars(result.p[j])));
      fAreaLog.appendChild(row);
    }
    sumCard.appendChild(fAreaLog);
  }

  panel.appendChild(sumCard);

  // Precompute standardized beta for linear regression: beta_std = beta_raw * (SD_x / SD_y)
  var stdBetas=null;
  if(!dvIsBinary){
    // SDs for y and each X column
    var ySum=0,ySum2=0;for(var ri=0;ri<y.length;ri++){ySum+=y[ri];ySum2+=y[ri]*y[ri];}
    var yMean=ySum/y.length;
    var yVar=ySum2/y.length-yMean*yMean;
    var ySD=y.length>1?Math.sqrt(yVar*y.length/(y.length-1)):0;
    stdBetas=new Array(result.beta.length);
    stdBetas[0]=null; // intercept
    for(var j=1;j<result.beta.length;j++){
      var xSum=0,xSum2=0;
      for(var ri=0;ri<X.length;ri++){xSum+=X[ri][j];xSum2+=X[ri][j]*X[ri][j];}
      var xMean=xSum/X.length;
      var xVar=xSum2/X.length-xMean*xMean;
      var xSD=X.length>1?Math.sqrt(xVar*X.length/(X.length-1)):0;
      stdBetas[j]=(ySD>0)?result.beta[j]*(xSD/ySD):NaN;
    }
  }

  // Compute VIF (only for linear with >=2 predictors; skip intercept)
  var vifs=null,maxVIF=0;
  if(!dvIsBinary&&X[0].length>=3){
    vifs=computeVIF(X);
    for(var j=1;j<vifs.length;j++){if(isFinite(vifs[j])&&vifs[j]>maxVIF)maxVIF=vifs[j];}
  }

  // Coefficient table
  var tCard=el('div','card');
  var coefTitle=el('div','card-title','Coefficients');
  tCard.appendChild(coefTitle);
  var tbl=el('table','stats-table');
  var thead=el('thead','');
  var thr=el('tr','');
  var hdrs;
  if(dvIsBinary){hdrs=['Term','B','OR','SE','z','p','95% CI'];}
  else if(vifs){hdrs=['Term','B','\u03B2 (std)','SE','t','p','95% CI','VIF'];}
  else{hdrs=['Term','B','\u03B2 (std)','SE','t','p','95% CI'];}
  hdrs.forEach(function(h){thr.appendChild(el('th','',h));});
  thead.appendChild(thr);tbl.appendChild(thead);
  var tbody=el('tbody','');
  for(var j=0;j<result.beta.length;j++){
    var tr=el('tr','');
    tr.appendChild(el('td','',result.vn[j]));
    tr.appendChild(el('td','',fmt(result.beta[j],3)));
    if(dvIsBinary){
      tr.appendChild(el('td','',fmt(result.or[j],3)));
    } else {
      tr.appendChild(el('td','',j===0?'\u2014':fmt(stdBetas[j],3)));
    }
    tr.appendChild(el('td','',fmt(result.se[j],3)));
    tr.appendChild(el('td','',fmt(dvIsBinary?result.z[j]:result.t[j],3)));
    var ptd=el('td','',fmtP(result.p[j])+' '+sigStars(result.p[j]));
    if(result.p[j]<.05)ptd.className='sig';
    tr.appendChild(ptd);
    tr.appendChild(el('td','','['+fmt(result.ci_lo[j],3)+', '+fmt(result.ci_hi[j],3)+']'));
    if(vifs){
      var vifCell;
      if(j===0){vifCell=el('td','','\u2014');}
      else{
        var v=vifs[j];
        var vtxt=isFinite(v)?fmt(v,2):'\u221E';
        vifCell=el('td','',vtxt);
        if(isFinite(v)&&v>10){vifCell.style.color='var(--error)';vifCell.style.fontWeight='700';vifCell.title='VIF > 10: severe multicollinearity';}
        else if(isFinite(v)&&v>5){vifCell.style.color='var(--caution)';vifCell.style.fontWeight='700';vifCell.title='VIF > 5: moderate multicollinearity';}
        else if(!isFinite(v)){vifCell.style.color='var(--error)';vifCell.title='Perfect collinearity';}
      }
      tr.appendChild(vifCell);
    }
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);tCard.appendChild(tbl);
  if(!dvIsBinary){
    var stdNote=el('div','');
    stdNote.style.cssText='font-size:10px;color:var(--text-muted);margin-top:6px;';
    stdNote.textContent='\u03B2 (std) = standardized beta = B \u00D7 (SD_x / SD_y). Useful for comparing effect sizes across predictors on different scales.';
    tCard.appendChild(stdNote);
  }
  // VIF warning / outlier diagnostics (linear only)
  if(!dvIsBinary&&vifs){
    var vifNote=el('div','');
    vifNote.style.cssText='font-size:10px;color:var(--text-muted);margin-top:4px;';
    vifNote.textContent='VIF = variance inflation factor (1/(1-R\u00B2_j)). VIF>5 = moderate multicollinearity; VIF>10 = severe.';
    tCard.appendChild(vifNote);
    if(maxVIF>5){
      var vifWarn=el('div','');
      vifWarn.style.cssText='margin-top:8px;padding:8px 12px;border-radius:6px;background:rgba(232,208,112,.1);border-left:3px solid '+(maxVIF>10?'var(--error)':'var(--caution)')+';font-size:11px;color:'+(maxVIF>10?'var(--error)':'var(--caution)')+';';
      vifWarn.textContent=(maxVIF>10?'\u26A0 Severe multicollinearity detected':'\u26A0 Moderate multicollinearity')+' (max VIF = '+fmt(maxVIF,2)+'). Coefficients may be unstable. Consider removing or combining correlated predictors.';
      tCard.appendChild(vifWarn);
    }
    // Residual outliers check
    var outRes=residualOutliers(y,X,result.beta);
    var outNote=el('div','');
    outNote.style.cssText='font-size:11px;margin-top:8px;padding:6px 10px;background:var(--bg-input);border-radius:var(--radius-sm);color:var(--text-secondary);';
    var outText='Outliers (|standardized residual| > 3): N = '+outRes.n_out+' ('+fmt(outRes.pct,1)+'%)';
    if(outRes.pct>2){outNote.style.borderLeft='3px solid var(--caution)';outNote.style.color='var(--caution)';outText+=' \u2014 above 2% threshold; check for influential cases.';}
    outNote.textContent=outText;
    tCard.appendChild(outNote);
  }
  panel.appendChild(tCard);

  // For logistic: add predicted probability curve for the most significant continuous IV
  if(dvIsBinary){
    // Pick most-significant IV with a valid continuous range (skip intercept)
    var bestIdx=-1,bestP=2;
    for(var j=1;j<result.beta.length;j++){
      // Only use if the raw data has at least some variance
      var col=[];for(var ri=0;ri<X.length;ri++)col.push(X[ri][j]);
      var mn=Math.min.apply(null,col),mx=Math.max.apply(null,col);
      if(mx-mn<=0)continue;
      // Skip binary 0/1 predictors for the curve
      var uniqueVals={};for(var ri=0;ri<col.length;ri++)uniqueVals[col[ri]]=1;
      if(Object.keys(uniqueVals).length<4)continue;
      if(result.p[j]<bestP){bestP=result.p[j];bestIdx=j;}
    }
    if(bestIdx>0){
      var ppCard=el('div','card');
      var ivName=result.vn[bestIdx];
      ppCard.appendChild(el('div','card-title','Predicted P('+getVarLabel(st.dv)+' = 1) as '+ivName+' varies'));
      var ppNote=el('div','');
      ppNote.style.cssText='font-size:11px;color:var(--text-muted);margin-bottom:8px;';
      ppNote.textContent='Other predictors held at their sample means. Rug plot shows raw observations (top = '+getVarLabel(st.dv)+'=1, bottom = '+getVarLabel(st.dv)+'=0).';
      ppCard.appendChild(ppNote);

      var ppCanvas=document.createElement('canvas');
      var ppSetup=setupHiDPICanvas(ppCanvas,640,360);
      ppCanvas.style.maxWidth='100%';
      ppCanvas.style.background='var(--bg-input)';ppCanvas.style.borderRadius='var(--radius-sm)';
      ppCard.appendChild(ppCanvas);
      // PNG download button
      var ppDl=makeExportBtn('Save PNG',function(){downloadCanvasPNG(ppCanvas,'predicted_prob.png');});
      ppDl.style.marginTop='6px';ppDl.style.marginLeft='0';
      ppCard.appendChild(ppDl);

      // Compute means for each column (for holding covariates constant)
      var colMeans=[];
      for(var jj=0;jj<result.beta.length;jj++){
        var s=0;for(var ri=0;ri<X.length;ri++)s+=X[ri][jj];
        colMeans.push(X.length>0?s/X.length:0);
      }

      // Get range for the selected IV
      var ivCol=[];for(var ri=0;ri<X.length;ri++)ivCol.push(X[ri][bestIdx]);
      var ivMin=Math.min.apply(null,ivCol),ivMax=Math.max.apply(null,ivCol);

      function predP(ivVal){
        var eta=0;
        for(var jj=0;jj<result.beta.length;jj++){
          var v=(jj===bestIdx)?ivVal:(jj===0?1:colMeans[jj]);
          eta+=result.beta[jj]*v;
        }
        return 1/(1+Math.exp(-Math.max(-500,Math.min(500,eta))));
      }

      var ctxP=ppSetup.ctx;
      var Wp=ppSetup.W,Hp=ppSetup.H;
      var padLp=60,padRp=20,padTp=20,padBp=50;
      var plotWp=Wp-padLp-padRp,plotHp=Hp-padTp-padBp;

      function xpP(x){return padLp+(x-ivMin)/(ivMax-ivMin)*plotWp;}
      function ypP(y){return padTp+plotHp-y*plotHp;}

      ctxP.fillStyle='#0f1419';ctxP.fillRect(0,0,Wp,Hp);
      // Grid
      ctxP.strokeStyle='rgba(40,48,64,0.5)';
      ctxP.fillStyle='#64748b';ctxP.font='10px system-ui,sans-serif';
      ctxP.textAlign='right';ctxP.textBaseline='middle';
      for(var gi=0;gi<=5;gi++){
        var yVal=gi/5;
        var py=ypP(yVal);
        ctxP.beginPath();ctxP.moveTo(padLp,py);ctxP.lineTo(padLp+plotWp,py);ctxP.stroke();
        ctxP.fillText(yVal.toFixed(2),padLp-6,py);
      }
      ctxP.textAlign='center';ctxP.textBaseline='top';
      for(var xi=0;xi<=5;xi++){
        var xVal=ivMin+(ivMax-ivMin)*xi/5;
        var px=xpP(xVal);
        ctxP.beginPath();ctxP.moveTo(px,padTp+plotHp);ctxP.lineTo(px,padTp+plotHp+4);ctxP.stroke();
        ctxP.fillText(xVal.toFixed(1),px,padTp+plotHp+6);
      }
      // Axes
      ctxP.strokeStyle='#283040';ctxP.lineWidth=1;
      ctxP.beginPath();
      ctxP.moveTo(padLp,padTp);ctxP.lineTo(padLp,padTp+plotHp);ctxP.lineTo(padLp+plotWp,padTp+plotHp);
      ctxP.stroke();
      // Axis labels
      ctxP.fillStyle='#8b98a5';ctxP.font='11px system-ui,sans-serif';
      ctxP.textAlign='center';ctxP.textBaseline='bottom';
      ctxP.fillText(ivName,padLp+plotWp/2,Hp-4);
      ctxP.save();ctxP.translate(14,padTp+plotHp/2);ctxP.rotate(-Math.PI/2);
      ctxP.textAlign='center';ctxP.textBaseline='middle';
      ctxP.fillText('Predicted P('+getVarLabel(st.dv)+'=1)',0,0);
      ctxP.restore();
      // Rug
      ctxP.fillStyle='rgba(109,216,160,0.6)';
      for(var ri=0;ri<X.length;ri++){
        if(y[ri]===1){
          var px=xpP(X[ri][bestIdx]);
          ctxP.fillRect(px,padTp+4,1,6);
        }
      }
      ctxP.fillStyle='rgba(224,144,144,0.6)';
      for(var ri=0;ri<X.length;ri++){
        if(y[ri]===0){
          var px=xpP(X[ri][bestIdx]);
          ctxP.fillRect(px,padTp+plotHp-10,1,6);
        }
      }
      // Predicted probability curve
      ctxP.strokeStyle='#5ba8e0';ctxP.lineWidth=2.5;
      ctxP.beginPath();
      var steps=80;
      for(var si=0;si<=steps;si++){
        var xv2=ivMin+(ivMax-ivMin)*si/steps;
        var pv=predP(xv2);
        var px=xpP(xv2),py=ypP(pv);
        if(si===0)ctxP.moveTo(px,py);else ctxP.lineTo(px,py);
      }
      ctxP.stroke();
      // 0.5 reference line
      ctxP.strokeStyle='rgba(139,152,165,0.4)';ctxP.setLineDash([4,4]);
      ctxP.beginPath();ctxP.moveTo(padLp,ypP(0.5));ctxP.lineTo(padLp+plotWp,ypP(0.5));ctxP.stroke();
      ctxP.setLineDash([]);

      panel.appendChild(ppCard);
    }
  }

  // Narrative interpretation
  var ivLabels = allVars.map(function(k) { return getVarLabel(k); });
  var narrativeCard = generateNarrative('regression', result, { dv: getVarLabel(st.dv), ivs: ivLabels });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'regression');
  }
}

function renderMediation(panel,st){
  if(!st.medX||!st.medM||!st.medY){
    panel.appendChild(el('div','placeholder','Select X, M, and Y variables'));
    return;
  }

  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;
  var src=wave===1?DATA.w1:DATA.w2;
  var isCrossMed=st.waveMode==='cross';

  var x=[],m=[],y=[];
  if(isCrossMed){
    // Cross-wave: X from W1 (via matched.link), M from W1 (default, for temporal ordering), Y from W2
    var xArr=DATA.w1[st.medX],mArr=DATA.w1[st.medM],yArr=DATA.w2[st.medY];
    for(var i=0;i<DATA.meta.w2_n;i++){
      if(!mask[i])continue;
      var w1i=DATA.matched.link[i];
      if(w1i===null||w1i===undefined)continue;
      var xv=xArr?xArr[w1i]:null,mv=mArr?mArr[w1i]:null,yv=yArr?yArr[i]:null;
      if(xv!==null&&xv!==undefined&&!isNaN(xv)&&mv!==null&&mv!==undefined&&!isNaN(mv)&&yv!==null&&yv!==undefined&&!isNaN(yv)){
        x.push(xv);m.push(mv);y.push(yv);
      }
    }
  } else {
    var xArr=src[st.medX],mArr=src[st.medM],yArr=src[st.medY];
    for(var i=0;i<n;i++){
      if(!mask[i])continue;
      var xv=xArr?xArr[i]:null,mv=mArr?mArr[i]:null,yv=yArr?yArr[i]:null;
      if(xv!==null&&!isNaN(xv)&&mv!==null&&!isNaN(mv)&&yv!==null&&!isNaN(yv)){
        x.push(xv);m.push(mv);y.push(yv);
      }
    }
  }

  if(x.length<10){
    panel.appendChild(el('div','card','Insufficient data (N = '+x.length+')'));
    return;
  }

  var result=sobelMed(x,m,y);
  if(result.error){
    panel.appendChild(el('div','card','Mediation error: '+result.error));
    return;
  }

  // Always label with wave — cross mode assigns W1 to X/M and W2 to Y; same-wave uses current wave
  var isCrossMed=st.waveMode==='cross';
  var currWaveMed=getAdvWave(st);
  function medWL(k,role){
    var lbl=getVarLabel(k);
    var w;
    if(isCrossMed)w=role==='y'?2:1;
    else w=currWaveMed;
    return '[W'+w+'] '+lbl;
  }
  // "What you're testing" summary card
  var xL=medWL(st.medX,'x'),mL=medWL(st.medM,'m'),yL=medWL(st.medY,'y');
  var testCard=el('div','');
  testCard.style.cssText='background:rgba(91,168,224,.06);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:1.6;';
  var testTitle=el('div','');
  testTitle.style.cssText='font-weight:600;color:var(--accent);margin-bottom:6px;';
  testTitle.textContent='What you are testing';
  testCard.appendChild(testTitle);
  var testQ=el('div','');
  testQ.textContent='Does '+mL+' explain HOW '+xL+' affects '+yL+'?';
  testCard.appendChild(testQ);
  var testDetail=el('div','');
  testDetail.style.cssText='color:var(--text-secondary);font-size:12px;margin-top:6px;';
  testDetail.textContent='X (Predictor): '+xL+' \u2022 M (Mediator): '+mL+' \u2022 Y (Outcome): '+yL+' \u2022 N = '+result.n;
  testCard.appendChild(testDetail);
  panel.appendChild(testCard);

  // Bootstrap 95% CI for indirect effect (percentile, 1000 resamples)
  var boot=bootstrapMediation(x,m,y,1000);

  // Path diagram — 4 paths: a, b, c (total), c' (direct)
  var card=el('div','card');
  var tit=el('div','card-title','Path Diagram');
  tit.appendChild(el('span','badge badge-accent','N = '+result.n));
  // Export CSV
  var medExport=makeExportBtn('Export CSV',function(){
    var rows=[
      ['Path','Coefficient','SE','p'],
      ['a (X->M)',result.a.toFixed(6),result.se_a.toFixed(6),result.p_a.toFixed(6)],
      ['b (M->Y | X)',result.b.toFixed(6),result.se_b.toFixed(6),result.p_b.toFixed(6)],
      ['c (total X->Y)',result.c.toFixed(6),'',''],
      ["c' (direct X->Y)",result.cp.toFixed(6),'',''],
      ['ab (indirect)',result.ab.toFixed(6),'',''],
      ['Sobel Z',result.sob_z.toFixed(6),'',result.sob_p.toFixed(6)],
      ['Pct_mediated',result.pct.toFixed(4),'',''],
      ['Bootstrap_CI_lo',isFinite(boot.lo)?boot.lo.toFixed(6):'',''],
      ['Bootstrap_CI_hi',isFinite(boot.hi)?boot.hi.toFixed(6):'',''],
      ['N',result.n,'','']
    ];
    downloadCSV(rows,'mediation_'+(st.medX||'x')+'_'+(st.medM||'m')+'_'+(st.medY||'y')+'.csv');
  });
  tit.appendChild(medExport);
  card.appendChild(tit);

  // Top row: X -> M -> Y with a and b paths
  var diagram=el('div','path-diagram');

  var xNode=el('div','path-node',xL);
  if(isCrossMed)xNode.style.borderColor=getWaveColor(1);
  diagram.appendChild(xNode);

  var aArrow=el('div','path-arrow');
  var aCoef=el('div','coef','a = '+fmt(result.a,3)+sigStars(result.p_a));
  aCoef.style.color=result.p_a<.05?'var(--success)':'var(--text-muted)';
  aArrow.appendChild(aCoef);
  var aLine=el('div','line');aArrow.appendChild(aLine);
  diagram.appendChild(aArrow);

  var mNode=el('div','path-node',mL);
  if(isCrossMed)mNode.style.borderColor=getWaveColor(1);
  diagram.appendChild(mNode);

  var bArrow=el('div','path-arrow');
  var bCoef=el('div','coef','b = '+fmt(result.b,3)+sigStars(result.p_b));
  bCoef.style.color=result.p_b<.05?'var(--success)':'var(--text-muted)';
  bArrow.appendChild(bCoef);
  var bLine=el('div','line');bArrow.appendChild(bLine);
  diagram.appendChild(bArrow);

  var yNode=el('div','path-node',yL);
  if(isCrossMed)yNode.style.borderColor=getWaveColor(2);
  diagram.appendChild(yNode);

  card.appendChild(diagram);

  // Bottom row: direct path X -> Y showing c (total) and c' (direct)
  var bottomRow=el('div','');
  bottomRow.style.cssText='display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 0 12px 0;';
  var xTag=el('div','');
  xTag.style.cssText='font-size:11px;color:var(--text-secondary);min-width:80px;text-align:right;';
  xTag.textContent=xL;
  bottomRow.appendChild(xTag);

  var arrowWrap=el('div','');
  arrowWrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;min-width:180px;';
  var cLine=el('div','');
  // Styled solid arrow for total (c)
  cLine.style.cssText='position:relative;width:160px;height:2px;background:var(--accent);';
  var cArrowHead=el('span','');
  cArrowHead.style.cssText='position:absolute;right:-2px;top:-4px;border:5px solid transparent;border-left:6px solid var(--accent);';
  cLine.appendChild(cArrowHead);
  var cLabel=el('div','');
  cLabel.style.cssText='font-size:11px;font-weight:700;';
  cLabel.textContent='c = '+fmt(result.c,3)+' (total)';
  cLabel.style.color='var(--accent)';
  arrowWrap.appendChild(cLabel);
  arrowWrap.appendChild(cLine);

  // Direct effect (c'), dashed beneath
  var cpLine=el('div','');
  cpLine.style.cssText='position:relative;width:160px;height:2px;background:repeating-linear-gradient(90deg,var(--orange) 0 6px,transparent 6px 12px);';
  var cpArrowHead=el('span','');
  cpArrowHead.style.cssText='position:absolute;right:-2px;top:-4px;border:5px solid transparent;border-left:6px solid var(--orange);';
  cpLine.appendChild(cpArrowHead);
  var cpLabel=el('div','');
  cpLabel.style.cssText='font-size:11px;font-weight:700;color:var(--orange);';
  cpLabel.textContent="c' = "+fmt(result.cp,3)+' (direct)';
  arrowWrap.appendChild(cpLine);
  arrowWrap.appendChild(cpLabel);
  bottomRow.appendChild(arrowWrap);

  var yTag=el('div','');
  yTag.style.cssText='font-size:11px;color:var(--text-secondary);min-width:80px;text-align:left;';
  yTag.textContent=yL;
  bottomRow.appendChild(yTag);

  card.appendChild(bottomRow);

  // Indirect effect summary below diagram
  // Bootstrap CI "significance": CI excludes 0 (both lo & hi same sign, neither 0)
  var bootSig=isFinite(boot.lo)&&isFinite(boot.hi)&&((boot.lo>0&&boot.hi>0)||(boot.lo<0&&boot.hi<0));
  var anySig=result.sob_p<.05||bootSig;
  var indirect=el('div','');
  indirect.style.cssText='text-align:center;padding:10px 12px;background:var(--bg-input);border-radius:var(--radius-sm);font-size:12px;margin-bottom:10px;';
  var indirectColor=anySig?'var(--success)':'var(--text-muted)';
  indirect.style.color=indirectColor;
  indirect.style.borderLeft='3px solid '+indirectColor;
  indirect.textContent='Indirect effect (a\u00D7b) = '+fmt(result.ab,3)+', Sobel z = '+fmt(result.sob_z,3)+', p = '+fmtP(result.sob_p)+' '+sigStars(result.sob_p);
  card.appendChild(indirect);

  // Bootstrap CI line (more robust than Sobel; percentile 95% CI)
  if(isFinite(boot.lo)&&isFinite(boot.hi)){
    var bootLine=el('div','');
    bootLine.style.cssText='text-align:center;padding:8px 12px;background:var(--bg-input);border-radius:var(--radius-sm);font-size:12px;margin-bottom:10px;';
    bootLine.style.color=bootSig?'var(--success)':'var(--text-muted)';
    bootLine.style.borderLeft='3px solid '+(bootSig?'var(--success)':'var(--border)');
    bootLine.textContent='Bootstrap 95% CI: ['+fmt(boot.lo,3)+', '+fmt(boot.hi,3)+'] ('+boot.n+' resamples)'+(bootSig?' \u2014 excludes 0, significant':' \u2014 includes 0, n.s.');
    card.appendChild(bootLine);
  }

  // Results table
  var tbl=el('table','stats-table');
  var tbody=el('tbody','');
  var rows=[
    ['Total effect (c)',fmt(result.c,3)],
    ['Direct effect (c\')',fmt(result.cp,3)],
    ['Indirect effect (a*b)',fmt(result.ab,3)],
    ['Sobel Z',fmt(result.sob_z,3)],
    ['Sobel p',fmtP(result.sob_p)+' '+sigStars(result.sob_p)],
    ['Bootstrap 95% CI',isFinite(boot.lo)?'['+fmt(boot.lo,3)+', '+fmt(boot.hi,3)+']':'n/a'],
    ['% Mediated',fmt(result.pct,1)+'%']
  ];
  rows.forEach(function(r){
    var tr=el('tr','');
    tr.appendChild(el('td','',r[0]));
    var td=el('td','',r[1]);
    if(r[0]==='Sobel p'&&result.sob_p<.05)td.className='sig';
    tr.appendChild(td);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);card.appendChild(tbl);

  // Interpretation
  var interp=el('div','');
  interp.style.fontSize='12px';interp.style.marginTop='10px';interp.style.padding='8px';
  interp.style.background='var(--bg-input)';interp.style.borderRadius='var(--radius-sm)';
  interp.style.color='var(--text-secondary)';
  if(result.sob_p<.05){
    interp.textContent='Significant mediation: '+mL+' mediates the relationship between '+xL+' and '+yL+' (Sobel Z = '+fmt(result.sob_z)+', p = '+fmtP(result.sob_p)+'), accounting for '+fmt(result.pct,1)+'% of the total effect.';
    interp.style.borderLeft='3px solid var(--caution)';
  } else {
    interp.textContent='No significant mediation detected (Sobel Z = '+fmt(result.sob_z)+', p = '+fmtP(result.sob_p)+').';
  }
  card.appendChild(interp);
  panel.appendChild(card);

  // Narrative interpretation
  var narrativeCard = generateNarrative('mediation', result, { x: xL, m: mL, y: yL });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'mediation');
  }
}

function renderModeration(panel,st){
  if(!st.modDV||!st.modIV||!st.modMod){
    panel.appendChild(el('div','placeholder','Select DV, IV, and Moderator'));
    return;
  }

  var wave=getAdvWave(st);
  var filters=getAdvFilter(st);
  var mask=buildMask(wave,filters);
  var n=wave===1?DATA.meta.w1_n:DATA.meta.w2_n;
  var src=wave===1?DATA.w1:DATA.w2;
  var isCrossMod=st.waveMode==='cross';

  var yv=[],xv=[],mv=[];
  if(isCrossMod){
    // Cross-wave: DV from W2, IV and Moderator from W1 (via matched.link)
    var dvArr=DATA.w2[st.modDV],ivArr=DATA.w1[st.modIV],modArr=DATA.w1[st.modMod];
    for(var i=0;i<DATA.meta.w2_n;i++){
      if(!mask[i])continue;
      var w1i=DATA.matched.link[i];
      if(w1i===null||w1i===undefined)continue;
      var d=dvArr?dvArr[i]:null,x2=ivArr?ivArr[w1i]:null,m2=modArr?modArr[w1i]:null;
      if(d!==null&&d!==undefined&&!isNaN(d)&&x2!==null&&x2!==undefined&&!isNaN(x2)&&m2!==null&&m2!==undefined&&!isNaN(m2)){
        yv.push(d);xv.push(x2);mv.push(m2);
      }
    }
  } else {
    var dvArr=src[st.modDV],ivArr=src[st.modIV],modArr=src[st.modMod];
    for(var i=0;i<n;i++){
      if(!mask[i])continue;
      var d=dvArr?dvArr[i]:null,x2=ivArr?ivArr[i]:null,m2=modArr?modArr[i]:null;
      if(d!==null&&!isNaN(d)&&x2!==null&&!isNaN(x2)&&m2!==null&&!isNaN(m2)){
        yv.push(d);xv.push(x2);mv.push(m2);
      }
    }
  }

  if(yv.length<10){
    panel.appendChild(el('div','card','Insufficient data (N = '+yv.length+')'));
    return;
  }

  var result=modAnalysis(yv,xv,mv);
  if(result.error){
    panel.appendChild(el('div','card','Moderation error: '+result.error));
    return;
  }

  // "What you're testing" summary card
  // Always label with wave — cross: DV=W2, IV/Mod=W1; same-wave uses current wave
  var isCrossMod=st.waveMode==='cross';
  var currWaveMod=getAdvWave(st);
  function modWL(k,role){
    var lbl=getVarLabel(k);
    var w;
    if(isCrossMod)w=role==='dv'?2:1;
    else w=currWaveMod;
    return '[W'+w+'] '+lbl;
  }
  var dvL=modWL(st.modDV,'dv'),ivL=modWL(st.modIV,'iv'),modL=modWL(st.modMod,'mod');
  var testCard=el('div','');
  testCard.style.cssText='background:rgba(91,168,224,.06);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:1.6;';
  var testTitle=el('div','');
  testTitle.style.cssText='font-weight:600;color:var(--accent);margin-bottom:6px;';
  testTitle.textContent='What you are testing';
  testCard.appendChild(testTitle);
  var testQ=el('div','');
  testQ.textContent='Does "'+modL+'" change the effect of "'+ivL+'" on "'+dvL+'"?';
  testCard.appendChild(testQ);
  var testDetail=el('div','');
  testDetail.style.cssText='color:var(--text-secondary);font-size:12px;margin-top:6px;';
  testDetail.textContent='Outcome: '+dvL+' \u2022 Predictor: '+ivL+' \u2022 Moderator: '+modL+' \u2022 N = '+result.n;
  testCard.appendChild(testDetail);
  panel.appendChild(testCard);

  // Detect if moderator is binary (0/1)
  var modIsBinary=true;
  for(var mi=0;mi<mv.length;mi++){if(mv[mi]!==0&&mv[mi]!==1){modIsBinary=false;break;}}

  // Model card
  var card=el('div','card');
  var tit=el('div','card-title','Model Summary');
  tit.appendChild(el('span','badge badge-accent','N = '+result.n));
  // Export CSV for moderation
  var modExportBtn=makeExportBtn('Export CSV',function(){
    var modRes2=result.mod;
    var rows2=[['Term','B','SE','t','p']];
    for(var j=0;j<modRes2.beta.length;j++){
      rows2.push([(['Intercept',ivL+' (c)',modL+' (c)',ivL+' x '+modL][j]||modRes2.vn[j]),
        modRes2.beta[j].toFixed(6),modRes2.se[j].toFixed(6),modRes2.t[j].toFixed(6),modRes2.p[j].toFixed(6)]);
    }
    rows2.push([]);
    rows2.push(['R2',modRes2.r2.toFixed(6),'Adj_R2',modRes2.adj_r2.toFixed(6),'F',modRes2.f_stat.toFixed(6),'p',modRes2.f_p.toFixed(6),'N',result.n]);
    rows2.push([]);
    rows2.push(['Level','Slope','SE','t','p']);
    result.slopes.forEach(function(s){rows2.push([s.l,s.sl.toFixed(6),s.se.toFixed(6),s.t.toFixed(6),s.p.toFixed(6)]);});
    downloadCSV(rows2,'moderation_'+(st.modDV||'dv')+'.csv');
  });
  tit.appendChild(modExportBtn);
  card.appendChild(tit);

  var modRes=result.mod;
  var sumStats=el('div','');
  sumStats.style.fontSize='12px';sumStats.style.color='var(--text-secondary)';sumStats.style.marginBottom='10px';
  sumStats.textContent='R\u00B2 = '+fmt(modRes.r2,3)+', F('+modRes.df_m+','+modRes.df_res+') = '+fmt(modRes.f_stat)+', p = '+fmtP(modRes.f_p);
  card.appendChild(sumStats);

  // Coefficient table with actual variable names (NOT "X" and "Moderator")
  var coefLabels=['Intercept',ivL+' (centered)',modL+' (centered)',ivL+' \u00D7 '+modL];
  var tbl=el('table','stats-table');
  var thead=el('thead','');
  var thr=el('tr','');
  ['Term','B','SE','t','p'].forEach(function(h){thr.appendChild(el('th','',h));});
  thead.appendChild(thr);tbl.appendChild(thead);
  var tbody=el('tbody','');
  for(var j=0;j<modRes.beta.length;j++){
    var tr=el('tr','');
    tr.appendChild(el('td','',coefLabels[j]||modRes.vn[j]));
    tr.appendChild(el('td','',fmt(modRes.beta[j],3)));
    tr.appendChild(el('td','',fmt(modRes.se[j],3)));
    tr.appendChild(el('td','',fmt(modRes.t[j],3)));
    var ptd=el('td','',fmtP(modRes.p[j])+' '+sigStars(modRes.p[j]));
    if(modRes.p[j]<.05)ptd.className='sig';
    tr.appendChild(ptd);
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);card.appendChild(tbl);

  // Warning if moderator is binary
  if(modIsBinary){
    var warn=el('div','');
    warn.style.cssText='background:rgba(232,176,96,.1);border:1px solid rgba(232,176,96,.3);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:11px;color:var(--orange);';
    warn.textContent='\u26A0 '+modL+' is binary (0/1). The \u00B11SD simple slopes below may be less interpretable than slopes at the actual values (0 vs 1).';
    card.appendChild(warn);
  }

  // Interaction significance
  var intP=modRes.p[3];
  var intNote=el('div','');
  intNote.style.fontSize='12px';intNote.style.marginTop='8px';intNote.style.padding='6px 8px';
  intNote.style.borderRadius='var(--radius-sm)';
  if(intP<.05){
    intNote.style.background='rgba(224,208,112,.1)';intNote.style.color='var(--caution)';
    intNote.textContent='Significant interaction (p = '+fmtP(intP)+'). Simple slopes below show how the effect of '+ivL+' on '+dvL+' varies at different levels of '+modL+'.';
  } else {
    intNote.style.background='var(--bg-input)';intNote.style.color='var(--text-secondary)';
    intNote.textContent='Interaction not significant (p = '+fmtP(intP)+'). Simple slopes shown for reference.';
  }
  card.appendChild(intNote);
  panel.appendChild(card);

  // Simple slopes
  var slCard=el('div','card');
  slCard.appendChild(el('div','card-title','Simple Slopes'));
  var slTbl=el('table','stats-table');
  var slTh=el('thead','');
  var slThr=el('tr','');
  ['Level','Slope','SE','t','p'].forEach(function(h){slThr.appendChild(el('th','',h));});
  slTh.appendChild(slThr);slTbl.appendChild(slTh);
  var slTb=el('tbody','');
  result.slopes.forEach(function(s){
    var tr=el('tr','');
    tr.appendChild(el('td','',s.l));
    tr.appendChild(el('td','',fmt(s.sl,3)));
    tr.appendChild(el('td','',fmt(s.se,3)));
    tr.appendChild(el('td','',fmt(s.t,3)));
    var ptd=el('td','',fmtP(s.p)+' '+sigStars(s.p));
    if(s.p<.05)ptd.className='sig';
    tr.appendChild(ptd);
    slTb.appendChild(tr);
  });
  slTbl.appendChild(slTb);slCard.appendChild(slTbl);

  // Slope visualization: colored bars showing slope magnitude and direction
  var slopeViz=el('div','slope-viz');
  var maxSlope=0;
  result.slopes.forEach(function(s){if(Math.abs(s.sl)>maxSlope)maxSlope=Math.abs(s.sl);});
  if(maxSlope===0)maxSlope=1;

  var slopeColors=['#5ba8e0','#b8a0e0','#e8a060'];
  result.slopes.forEach(function(s,idx){
    var wrap=el('div','slope-bar-wrap');
    wrap.appendChild(el('div','slope-bar-label',s.l));

    var track=el('div','slope-bar-track');
    var centerLine=el('div','slope-bar-center');
    track.appendChild(centerLine);

    var fill=el('div','slope-bar-fill');
    var pctWidth=(Math.abs(s.sl)/maxSlope)*48;
    if(s.sl>=0){
      fill.style.left='50%';
      fill.style.width=pctWidth+'%';
      fill.style.background='linear-gradient(90deg,'+darkenColor(slopeColors[idx])+','+slopeColors[idx]+')';
    } else {
      fill.style.left=(50-pctWidth)+'%';
      fill.style.width=pctWidth+'%';
      fill.style.background='linear-gradient(90deg,'+slopeColors[idx]+','+darkenColor(slopeColors[idx])+')';
    }
    if(s.p<.05)fill.style.boxShadow='0 0 6px '+slopeColors[idx];
    track.appendChild(fill);
    wrap.appendChild(track);

    var valStr='b = '+fmt(s.sl,3);
    if(s.p<.05)valStr+=' *';
    var valEl=el('div','slope-bar-val',valStr);
    if(s.p<.05)valEl.style.color='var(--caution)';
    wrap.appendChild(valEl);

    slopeViz.appendChild(wrap);
  });
  slCard.appendChild(slopeViz);

  // Interpretation note for slopes
  var slopeNote=el('div','');
  slopeNote.style.fontSize='11px';slopeNote.style.color='var(--text-muted)';slopeNote.style.marginTop='8px';
  slopeNote.style.padding='6px 8px';slopeNote.style.background='var(--bg-input)';slopeNote.style.borderRadius='var(--radius-sm)';
  var sigSlopes=result.slopes.filter(function(s2){return s2.p<.05;});
  if(sigSlopes.length>0){
    slopeNote.textContent='Significant slopes marked with *. The effect of '+ivL+' on '+dvL+' is significant at '+sigSlopes.map(function(s3){return s3.l;}).join(' and ')+' levels of '+modL+'.';
    slopeNote.style.borderLeft='3px solid var(--caution)';
  } else {
    slopeNote.textContent='No simple slopes reached significance at p < .05.';
  }
  slCard.appendChild(slopeNote);

  panel.appendChild(slCard);

  // Interaction plot (Canvas) — predicted DV as IV varies at different moderator levels
  var plotCard=el('div','card');
  plotCard.appendChild(el('div','card-title','Interaction Plot'));
  var subNote=el('div','');
  subNote.style.cssText='font-size:11px;color:var(--text-muted);margin-bottom:8px;';
  subNote.textContent='Predicted '+dvL+' as '+ivL+' varies, at '+(modIsBinary?modL+'=0 vs '+modL+'=1':'-1SD / Mean / +1SD levels of '+modL)+'. Raw observations shown as dots.';
  plotCard.appendChild(subNote);

  var canvas=document.createElement('canvas');
  var modSetup=setupHiDPICanvas(canvas,640,360);
  canvas.style.maxWidth='100%';canvas.style.background='var(--bg-input)';canvas.style.borderRadius='var(--radius-sm)';
  plotCard.appendChild(canvas);
  // PNG download button for moderation plot
  var modDl=makeExportBtn('Save PNG',function(){downloadCanvasPNG(canvas,'interaction_plot.png');});
  modDl.style.marginTop='6px';modDl.style.marginLeft='0';
  plotCard.appendChild(modDl);

  // Compute means/SDs for IV, Moderator, DV (used for un-centering)
  var xMean=0,mMean=0;for(var ci=0;ci<xv.length;ci++){xMean+=xv[ci];mMean+=mv[ci];}
  xMean/=xv.length;mMean/=mv.length;
  var mSD=0;for(var ci=0;ci<mv.length;ci++)mSD+=(mv[ci]-mMean)*(mv[ci]-mMean);
  mSD=Math.sqrt(mSD/(mv.length-1));
  var xMin=Infinity,xMax=-Infinity,yMin=Infinity,yMax=-Infinity;
  for(var ci=0;ci<xv.length;ci++){
    if(xv[ci]<xMin)xMin=xv[ci];if(xv[ci]>xMax)xMax=xv[ci];
    if(yv[ci]<yMin)yMin=yv[ci];if(yv[ci]>yMax)yMax=yv[ci];
  }

  // Line levels: binary moderator -> 0,1; continuous -> -1SD, Mean, +1SD
  var modLevels;
  if(modIsBinary){
    modLevels=[{label:modL+'=0',val:0,color:'#5ba8e0'},{label:modL+'=1',val:1,color:'#e8a060'}];
  } else {
    modLevels=[
      {label:'-1SD '+modL,val:mMean-mSD,color:'#5ba8e0'},
      {label:'Mean '+modL,val:mMean,color:'#8b98a5'},
      {label:'+1SD '+modL,val:mMean+mSD,color:'#e8a060'}
    ];
  }

  // Predicted value at (x,m): Int + b_X*(x-xMean) + b_M*(m-mMean) + b_XM*(x-xMean)*(m-mMean)
  var b=modRes.beta;
  function predY(x,m){return b[0]+b[1]*(x-xMean)+b[2]*(m-mMean)+b[3]*(x-xMean)*(m-mMean);}

  // Expand y range to include predicted lines
  modLevels.forEach(function(lv){
    var y1=predY(xMin,lv.val),y2=predY(xMax,lv.val);
    if(y1<yMin)yMin=y1;if(y1>yMax)yMax=y1;
    if(y2<yMin)yMin=y2;if(y2>yMax)yMax=y2;
  });
  // Padding
  var yPad=(yMax-yMin)*0.08;if(yPad===0)yPad=1;
  var xPad=(xMax-xMin)*0.02;if(xPad===0)xPad=0.5;
  var plotXMin=xMin-xPad,plotXMax=xMax+xPad;
  var plotYMin=yMin-yPad,plotYMax=yMax+yPad;

  var ctx=modSetup.ctx;
  var W=modSetup.W,H=modSetup.H;
  var padL=60,padR=20,padT=20,padB=50;
  var plotW=W-padL-padR,plotH=H-padT-padB;

  function xp(x){return padL+(x-plotXMin)/(plotXMax-plotXMin)*plotW;}
  function yp(y){return padT+plotH-(y-plotYMin)/(plotYMax-plotYMin)*plotH;}

  // Clear
  ctx.fillStyle='#0f1419';ctx.fillRect(0,0,W,H);

  // Axes + grid
  ctx.strokeStyle='#283040';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+plotH);ctx.lineTo(padL+plotW,padT+plotH);
  ctx.stroke();
  // Grid lines (5 horizontal)
  ctx.strokeStyle='rgba(40,48,64,0.5)';
  ctx.fillStyle='#64748b';ctx.font='10px system-ui,sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
  for(var gi=0;gi<=5;gi++){
    var yVal=plotYMin+(plotYMax-plotYMin)*gi/5;
    var py=yp(yVal);
    ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(padL+plotW,py);ctx.stroke();
    ctx.fillText(yVal.toFixed(1),padL-6,py);
  }
  // X ticks (5)
  ctx.textAlign='center';ctx.textBaseline='top';
  for(var xi=0;xi<=5;xi++){
    var xVal=plotXMin+(plotXMax-plotXMin)*xi/5;
    var px=xp(xVal);
    ctx.beginPath();ctx.moveTo(px,padT+plotH);ctx.lineTo(px,padT+plotH+4);ctx.stroke();
    ctx.fillText(xVal.toFixed(1),px,padT+plotH+6);
  }

  // Axis labels
  ctx.fillStyle='#8b98a5';ctx.font='11px system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(ivL,padL+plotW/2,H-4);
  ctx.save();ctx.translate(14,padT+plotH/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Predicted '+dvL,0,0);
  ctx.restore();

  // Scatter (raw data)
  ctx.fillStyle='rgba(139,152,165,0.35)';
  for(var si=0;si<xv.length;si++){
    var px=xp(xv[si]),py=yp(yv[si]);
    ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
  }

  // Draw predicted lines
  modLevels.forEach(function(lv){
    ctx.strokeStyle=lv.color;
    ctx.lineWidth=(lv.label.indexOf('Mean')===0?1.5:2.5);
    if(lv.label.indexOf('Mean')===0)ctx.setLineDash([4,4]);else ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(xp(plotXMin),yp(predY(plotXMin,lv.val)));
    ctx.lineTo(xp(plotXMax),yp(predY(plotXMax,lv.val)));
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Legend
  var legX=padL+plotW-160,legY=padT+10;
  ctx.fillStyle='rgba(16,20,26,0.85)';
  ctx.fillRect(legX-8,legY-6,160,modLevels.length*18+10);
  ctx.strokeStyle='#283040';ctx.strokeRect(legX-8,legY-6,160,modLevels.length*18+10);
  ctx.font='11px system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
  modLevels.forEach(function(lv,idx){
    var ly=legY+idx*18+6;
    ctx.strokeStyle=lv.color;ctx.lineWidth=2.5;
    if(lv.label.indexOf('Mean')===0)ctx.setLineDash([4,4]);else ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(legX,ly);ctx.lineTo(legX+24,ly);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#e0e4e8';
    ctx.fillText(lv.label,legX+30,ly);
  });

  panel.appendChild(plotCard);

  // Narrative interpretation
  var narrativeCard = generateNarrative('moderation', result, { dv: dvL, iv: ivL, mod: modL });
  if (narrativeCard) {
    panel.appendChild(narrativeCard);
    addAIInterpretButton(narrativeCard, 'moderation');
  }
}

/* ============================================================
   TAB 5: TRANSITION GROUPS
   ============================================================ */
function buildTransitionTab(pane){
  pane.style.flexDirection='column';

  // Header
  var hbar=el('div','group-bar');
  hbar.appendChild(el('label','','Transition Group Analysis'));
  var effN=el('span','eff-n','Matched N = '+DATA.meta.w2_n);
  hbar.appendChild(effN);
  pane.appendChild(hbar);

  var mainPanel=el('div','main-panel');
  mainPanel.style.overflowY='auto';
  pane.appendChild(mainPanel);

  renderTransitionTab(mainPanel);
}

function renderTransitionTab(panel){
  clearEl(panel);

  var tGroups=[
    {value:0,label:'Never Used AI-MH',color:'#8b98a5',badgeCls:'badge-muted'},
    {value:1,label:'Adopter (No\u2192Yes)',color:'#6dd8a0',badgeCls:'badge-success'},
    {value:2,label:'Continuer (Yes\u2192Yes)',color:'#5ba8e0',badgeCls:'badge-accent'},
    {value:3,label:'Discontinuer (Yes\u2192No)',color:'#e09090',badgeCls:'badge-error'}
  ];

  // Count per group
  var counts={};
  tGroups.forEach(function(g){counts[g.value]=0;});
  for(var i=0;i<DATA.meta.w2_n;i++){
    var t=DATA.matched.transition[i];
    if(counts[t]!==undefined)counts[t]++;
  }

  // Overview card
  var ovCard=el('div','card');
  ovCard.appendChild(el('div','card-title','Transition Group Overview'));
  var maxCnt=Math.max.apply(null,tGroups.map(function(g){return counts[g.value];}));
  if(maxCnt===0)maxCnt=1;
  var area=el('div','chart-area');
  tGroups.forEach(function(g){
    var row=el('div','bar-row');
    row.appendChild(el('div','bar-label',g.label));
    var track=el('div','bar-track');
    var fill=el('div','bar-fill');
    fill.style.background='linear-gradient(90deg, '+darkenColor(g.color)+', '+g.color+')';
    fill.style.width=(counts[g.value]/maxCnt*100)+'%';
    track.appendChild(fill);row.appendChild(track);
    var pct=DATA.meta.w2_n>0?counts[g.value]/DATA.meta.w2_n*100:0;
    row.appendChild(el('div','bar-val',counts[g.value]+' ('+fmt(pct,1)+'%)'));
    area.appendChild(row);
  });
  ovCard.appendChild(area);
  panel.appendChild(ovCard);

  // 4-panel grid
  var grid=el('div','trans-grid');

  tGroups.forEach(function(tg){
    var tpanel=el('div','trans-panel');
    tpanel.style.borderTopColor=tg.color;tpanel.style.borderTopWidth='3px';

    var h3=el('h3','');
    h3.style.color=tg.color;
    h3.textContent=tg.label;
    var badge=el('span','badge '+tg.badgeCls,'N = '+counts[tg.value]);
    h3.appendChild(badge);
    tpanel.appendChild(h3);

    // Demographics for this group
    var mask=new Uint8Array(DATA.meta.w2_n);
    for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;

    // Gender breakdown
    var genderVec=getVecRaw(2,'Gender',mask);
    var gCounts={1:0,2:0,3:0};
    genderVec.forEach(function(v){if(gCounts[v]!==undefined)gCounts[v]++;});
    var gTotal=genderVec.length;
    var demDiv=el('div','');demDiv.style.fontSize='11px';demDiv.style.color='var(--text-secondary)';demDiv.style.marginBottom='8px';
    if(gTotal>0){
      demDiv.textContent='Male: '+gCounts[1]+' ('+fmt(gCounts[1]/gTotal*100,0)+'%) | Female: '+gCounts[2]+' ('+fmt(gCounts[2]/gTotal*100,0)+'%)';
    }
    tpanel.appendChild(demDiv);

    // Key scale means
    var keyVars=['DASS_Total','ECR_AI_Anxiety','ECR_AI_Avoidance','ANTRO_Mean'];
    var availVars=keyVars.filter(function(k){return DATA.w2[k];});

    if(availVars.length>0){
      var scaleDiv=el('div','');
      availVars.forEach(function(k){
        var vec=getVec(2,k,mask);
        var s=descStats(vec);
        if(s.n===0)return;

        // Also get W1 mean for matched participants
        var paired=getPairedVecs(k,mask);
        var w1s=paired?descStats(paired.w1):{n:0};

        var row=el('div','');row.style.fontSize='11px';row.style.marginBottom='4px';
        var lbl=el('span','',getVarLabel(k)+': ');lbl.style.color='var(--text-secondary)';
        row.appendChild(lbl);
        var val=el('span','','M = '+fmt(s.mean));val.style.color='var(--text-primary)';
        row.appendChild(val);

        if(w1s.n>0){
          var diff=s.mean-w1s.mean;
          var diffSpan=el('span','','  ('+(diff>=0?'+':'')+fmt(diff)+')');
          diffSpan.style.color=diff>0?'var(--error)':diff<0?'var(--success)':'var(--text-muted)';
          diffSpan.style.fontSize='10px';
          row.appendChild(diffSpan);
        }
        scaleDiv.appendChild(row);
      });
      tpanel.appendChild(scaleDiv);
    }

    grid.appendChild(tpanel);
  });
  panel.appendChild(grid);

  // Diverging bar chart: change scores
  var divCard=el('div','card');
  divCard.appendChild(el('div','card-title','Mean Change Scores (W2 - W1) by Transition Group'));

  var changeVars=['DASS_Total','DASS_Depression','DASS_Anxiety','DASS_Stress','ECR_AI_Anxiety','ECR_AI_Avoidance','ANTRO_Mean'];
  var availChangeVars=changeVars.filter(function(k){return DATA.w1[k]&&DATA.w2[k];});

  if(availChangeVars.length>0){
    var maxAbsChange=0;
    var changeData={};
    tGroups.forEach(function(tg){
      changeData[tg.value]={};
      var mask2=new Uint8Array(DATA.meta.w2_n);
      for(var i2=0;i2<DATA.meta.w2_n;i2++)mask2[i2]=DATA.matched.transition[i2]===tg.value?1:0;
      availChangeVars.forEach(function(k){
        var paired2=getPairedVecs(k,mask2);
        if(!paired2||paired2.w1.length<2){changeData[tg.value][k]={mean:0,n:0};return;}
        var diffs2=[];for(var i3=0;i3<paired2.w1.length;i3++)diffs2.push(paired2.w2[i3]-paired2.w1[i3]);
        var s2=descStats(diffs2);
        changeData[tg.value][k]={mean:s2.mean,n:s2.n};
        if(Math.abs(s2.mean)>maxAbsChange)maxAbsChange=Math.abs(s2.mean);
      });
    });
    if(maxAbsChange===0)maxAbsChange=1;

    availChangeVars.forEach(function(k){
      var secHdr=el('div','',getVarLabel(k));
      secHdr.style.fontSize='11px';secHdr.style.fontWeight='600';secHdr.style.color='var(--text-secondary)';secHdr.style.marginTop='10px';secHdr.style.marginBottom='4px';
      divCard.appendChild(secHdr);

      tGroups.forEach(function(tg){
        var cd=changeData[tg.value][k];
        if(!cd||cd.n===0)return;
        var row=el('div','div-bar-row');
        var lbl=el('div','div-bar-label',tg.label.split(' ')[0]);
        lbl.style.color=tg.color;
        row.appendChild(lbl);

        var negDiv=el('div','div-bar-neg');
        var posDiv=el('div','div-bar-pos');
        var center=el('div','div-bar-center');

        if(cd.mean<0){
          var seg=el('div','div-bar-seg');
          seg.style.background='linear-gradient(90deg, '+darkenColor(tg.color)+', '+tg.color+')';
          seg.style.width=(Math.abs(cd.mean)/maxAbsChange*100)+'%';
          negDiv.appendChild(seg);
        } else {
          var seg2=el('div','div-bar-seg');
          seg2.style.background='linear-gradient(90deg, '+tg.color+', '+darkenColor(tg.color)+')';
          seg2.style.width=(Math.abs(cd.mean)/maxAbsChange*100)+'%';
          posDiv.appendChild(seg2);
        }

        row.appendChild(negDiv);row.appendChild(center);row.appendChild(posDiv);
        row.appendChild(el('div','div-bar-val',(cd.mean>=0?'+':'')+fmt(cd.mean)));
        divCard.appendChild(row);
      });
    });
  }
  panel.appendChild(divCard);
}

/* ============================================================
   TAB 6: WAR CONTEXT
   ============================================================ */
function buildWarTab(pane){
  pane.style.flexDirection='column';

  var hbar=el('div','group-bar');
  hbar.appendChild(el('label','','War Context (Wave 2)'));
  var effN=el('span','eff-n','N = '+DATA.meta.w2_n);
  hbar.appendChild(effN);
  pane.appendChild(hbar);

  var mainPanel=el('div','main-panel');
  mainPanel.style.overflowY='auto';
  pane.appendChild(mainPanel);

  renderWarTab(mainPanel);
}

function renderWarTab(panel){
  clearEl(panel);

  // Find war variables
  var warVars=[];
  var allKeys=Object.keys(DATA.meta.vars);
  for(var i=0;i<allKeys.length;i++){
    var m=DATA.meta.vars[allKeys[i]];
    if((m.construct==='war'||allKeys[i].toLowerCase().indexOf('war')>=0||allKeys[i].toLowerCase().indexOf('duty')>=0||allKeys[i].toLowerCase().indexOf('missile')>=0)&&m.waves&&m.waves.indexOf(2)>=0){
      warVars.push(allKeys[i]);
    }
  }

  if(warVars.length===0){
    panel.appendChild(el('div','card','No war context variables found in the data.'));
    return;
  }

  // Render each war variable
  var grid=el('div','war-grid');

  warVars.forEach(function(key){
    var card=el('div','card');
    var meta=getVarMeta(key);
    card.appendChild(el('div','card-title',meta.label||key));

    var vec=getVecRaw(2,key,null);
    var counts={},total=0;
    for(var i=0;i<vec.length;i++){
      var v=vec[i];if(v===null||v===undefined)continue;
      counts[v]=(counts[v]||0)+1;total++;
    }

    if(total===0){
      card.appendChild(el('div','placeholder','No data'));
      grid.appendChild(card);
      return;
    }

    var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
    var maxC=counts[sorted[0]]||1;
    var labels=meta.labels||{};

    var area=el('div','chart-area');
    sorted.forEach(function(k,idx){
      var row=el('div','bar-row');
      var lbl=labels[k]||k;
      row.appendChild(el('div','bar-label',String(lbl)));
      var track=el('div','bar-track');
      var fill=el('div','bar-fill '+FILL_CLASSES[idx%FILL_CLASSES.length]);
      fill.style.width=(counts[k]/maxC*100)+'%';
      track.appendChild(fill);row.appendChild(track);
      row.appendChild(el('div','bar-val',counts[k]+' ('+fmt(counts[k]/total*100,1)+'%)'));
      area.appendChild(row);
    });
    card.appendChild(area);

    // N annotation
    var nNote=el('div','');nNote.style.fontSize='10px';nNote.style.color='var(--text-muted)';nNote.style.marginTop='6px';
    nNote.textContent='N = '+total;
    card.appendChild(nNote);

    grid.appendChild(card);
  });

  panel.appendChild(grid);

  // War distress by transition group
  var distressKey=null;
  for(var i=0;i<warVars.length;i++){
    if(warVars[i].toLowerCase().indexOf('distress')>=0){distressKey=warVars[i];break;}
  }

  if(distressKey){
    var dCard=el('div','card');
    dCard.appendChild(el('div','card-title','War Distress by Transition Group'));

    var tGroups=[
      {value:0,label:'Never',color:'#8b98a5'},
      {value:1,label:'Adopter',color:'#6dd8a0'},
      {value:2,label:'Continuer',color:'#5ba8e0'},
      {value:3,label:'Discontinuer',color:'#e09090'}
    ];

    var stats=[];
    tGroups.forEach(function(tg){
      var mask=new Uint8Array(DATA.meta.w2_n);
      for(var i=0;i<DATA.meta.w2_n;i++)mask[i]=DATA.matched.transition[i]===tg.value?1:0;
      var vec=getVec(2,distressKey,mask);
      var s=descStats(vec);
      s.label=tg.label;s.color=tg.color;
      stats.push(s);
    });

    var maxM=0;
    stats.forEach(function(s){if(s.n>0&&s.mean+s.sd>maxM)maxM=s.mean+s.sd;});
    if(maxM===0)maxM=1;

    var area2=el('div','chart-area');
    stats.forEach(function(s){
      if(s.n===0)return;
      var row=el('div','bar-row');
      row.appendChild(el('div','bar-label',s.label));
      var track=el('div','bar-track');
      var fill=el('div','bar-fill');
      fill.style.background='linear-gradient(90deg, '+darkenColor(s.color)+', '+s.color+')';
      fill.style.width=(s.mean/maxM*100)+'%';
      track.appendChild(fill);row.appendChild(track);
      row.appendChild(el('div','bar-val','M='+fmt(s.mean)+' (N='+s.n+')'));
      area2.appendChild(row);
    });
    dCard.appendChild(area2);

    // Stats table
    var tbl=el('table','stats-table');
    var thead=el('thead','');
    var thr=el('tr','');
    ['Group','N','Mean','SD'].forEach(function(h){thr.appendChild(el('th','',h));});
    thead.appendChild(thr);tbl.appendChild(thead);
    var tbody=el('tbody','');
    stats.forEach(function(s){
      if(s.n===0)return;
      var tr=el('tr','');
      tr.appendChild(el('td','',s.label));
      tr.appendChild(el('td','',String(s.n)));
      tr.appendChild(el('td','',fmt(s.mean)));
      tr.appendChild(el('td','',fmt(s.sd)));
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);dCard.appendChild(tbl);
    panel.appendChild(dCard);
  }

  // Summary stats card
  var sumCard=el('div','card');
  sumCard.appendChild(el('div','card-title','War Context Summary'));

  // Compute key stats
  var harmKey=warVars.find(function(k){return k.toLowerCase().indexOf('harm')>=0;});
  var houseKey=warVars.find(function(k){return k.toLowerCase().indexOf('house')>=0||k.toLowerCase().indexOf('evacu')>=0;});
  var missileKey=warVars.find(function(k){return k.toLowerCase().indexOf('missile')>=0;});

  var summaryItems=[];
  if(harmKey){
    var hVec=getVecRaw(2,harmKey,null);
    var harmed=0;hVec.forEach(function(v){if(v!==null&&v!==0&&v!=='0')harmed++;});
    summaryItems.push({label:'Reported any war harm',value:hVec.length>0?harmed+'/'+hVec.length+' ('+fmt(harmed/hVec.length*100,1)+'%)':'N/A'});
  }
  if(houseKey){
    var eVec=getVecRaw(2,houseKey,null);
    var evac=0;eVec.forEach(function(v){if(v===1||v==='1')evac++;});
    summaryItems.push({label:'Evacuated from home',value:eVec.length>0?evac+'/'+eVec.length+' ('+fmt(evac/eVec.length*100,1)+'%)':'N/A'});
  }
  if(missileKey){
    var mVec=getVecRaw(2,missileKey,null);
    var exposed=0;mVec.forEach(function(v){if(v===1||v==='1')exposed++;});
    summaryItems.push({label:'Missile exposure',value:mVec.length>0?exposed+'/'+mVec.length+' ('+fmt(exposed/mVec.length*100,1)+'%)':'N/A'});
  }
  if(distressKey){
    var dVec=getVec(2,distressKey,null);
    var dStats=descStats(dVec);
    summaryItems.push({label:'Mean war distress',value:fmt(dStats.mean)+' (SD = '+fmt(dStats.sd)+')'});
  }

  if(summaryItems.length>0){
    var sTbl=el('table','stats-table');
    var sTb=el('tbody','');
    summaryItems.forEach(function(item){
      var tr=el('tr','');
      tr.appendChild(el('td','',item.label));
      tr.appendChild(el('td','',item.value));
      sTb.appendChild(tr);
    });
    sTbl.appendChild(sTb);sumCard.appendChild(sTbl);
  } else {
    sumCard.appendChild(el('div','','Compute summary statistics from available war variables.'));
  }
  panel.appendChild(sumCard);
}

/* ============================================================
   INIT
   ============================================================ */
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initAuth);
} else {
  initAuth();
}

})();
</script>
